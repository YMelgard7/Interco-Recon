<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;color:#111;min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:1.5rem 1rem}
button,select,input,textarea{font-family:inherit}
.btn{font-size:12px;padding:5px 11px;border-radius:7px;border:0.5px solid #d4d4d4;background:#fff;color:#111;cursor:pointer}
.btn:hover{background:#f5f5f3}
.btn-dark{font-size:12px;padding:6px 14px;border-radius:7px;border:none;background:#111;color:#fff;cursor:pointer;font-weight:500}
.btn-green{font-size:12px;padding:5px 11px;border-radius:7px;border:none;background:#16a34a;color:#fff;cursor:pointer}
.btn-blue{font-size:12px;padding:5px 11px;border-radius:7px;border:none;background:#2563eb;color:#fff;cursor:pointer}
.btn-sm{font-size:11px;padding:3px 7px;border-radius:5px;border:0.5px solid #d4d4d4;background:#fff;color:#111;cursor:pointer}
.card{background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;overflow:hidden;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-head{padding:10px 16px;border-bottom:0.5px solid #e5e5e5;background:#fafafa;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:500}

.modal-title{font-size:15px;font-weight:500;margin-bottom:14px}

.editable-cell{cursor:pointer;border-bottom:1px dashed #bbb;padding:1px 3px;border-radius:3px;display:inline-block;min-width:40px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.stmt-entity-head{background:#f0fdf4;border-left:3px solid #16a34a;padding:10px 14px;font-weight:500;font-size:13px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.stmt-section-head{background:#fafafa;padding:7px 14px;font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid #e5e5e5}

.excl{color:#dc2626;font-size:11px;font-weight:500}

<body>
<div id="root"></div>
<script>
const SUPA_URL='https://zwinmrqclkefpsfedwgg.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3aW5tcnFjbGtlZnBzZmVkd2dnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjY5MzUsImV4cCI6MjA5NjEwMjkzNX0.1uQY3ypn9223gDAWodnqmW82gfNBFo-whBhl4GMU5Dw';
const H={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
const api={
  get:async(t,p='')=>{const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{headers:{...H,'Range-Unit':'items','Range':'0-9999'}});if(!r.ok)throw new Error(await r.text());return r.json()},
  getAll:async(t,filter='')=>{
    // paginate in batches of 1000 to bypass Supabase default limit
    let all=[],from=0,batchSize=1000;
    while(true){
      const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${filter}&order=period.asc`,{
        headers:{...H,'Range-Unit':'items','Range':`${from}-${from+batchSize-1}`,'Prefer':'count=exact'}
      });
      if(!r.ok)throw new Error(await r.text());
      const batch=await r.json();
      all=[...all,...batch];
      if(batch.length<batchSize)break;
      from+=batchSize;
    }
    return all;
  },
  post:async(t,b)=>{const r=await fetch(`${SUPA_URL}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json()},
  patch:async(t,p,b)=>{const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json()},
  del:async(t,p)=>{const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text())}
};

const fmt=v=>'$'+Math.abs(Number(v)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=v=>{if(Math.abs(v)<0.02)return'<span class="ok">—</span>';return`<span class="warn">${v>0?'+':'-'}${fmt(v)}</span>`;};
const isAR=r=>r.relationship&&(r.relationship.includes('A/R')||r.relationship.toLowerCase().includes('due from'));
const PORD=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const sortP=(a,b)=>{const[am,ay]=a.split(' '),[bm,by]=b.split(' ');return ay!==by?Number(ay)-Number(by):PORD.indexOf(am)-PORD.indexOf(bm);};
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// A-P = read-only (cols 1-16), Q-AB = editable (cols 17-28)
const READONLY_COLS=[
  {key:'subsidiary',    label:'A Subsidiary'},
  {key:'internal_id',   label:'B Internal ID'},
  {key:'tx_date',       label:'C Date'},
  {key:'memo',          label:'D Memo (Main)'},
  {key:'account',       label:'E Account'},
  {key:'amount_functional', label:'F Amount'},
  {key:'amount',        label:'G Amt (FC)'},
  {key:'doc_number',    label:'H Doc Number'},
  {key:'name',          label:'I Name'},
  {key:'tx_type',       label:'J Type'},
  {key:'site',          label:'K Site'},
  {key:'currency',      label:'L Currency'},
  {key:'status',        label:'M Status'},
  {key:'period',        label:'N Period'},
  {key:'status2',       label:'O Status2'},
  {key:'memo2',         label:'P Memo'},
];
const EDITABLE_COLS=[
  {key:'sub_name',           label:'Q Sub Name',          type:'text'},
  {key:'relationship',       label:'R Relationship',       type:'text'},
  {key:'relationship_group', label:'S Rel Group',          type:'text'},
  {key:'pair_key',           label:'T Pair Key',           type:'text'},
  {key:'net_ic_balance',     label:'U Net I/C Balance',    type:'number'},
  {key:'ic_name',            label:'V IC Name',            type:'text'},
  {key:'who_owes_who',       label:'W Who Owes Who',       type:'text'},
  {key:'who_owes',           label:'X Who Owes',           type:'text'},
  {key:'who_is_owed',        label:'Y Who Is Owed',        type:'text'},
  {key:'include_exclude',    label:'Z Include/Exclude',    type:'select',options:['Include','Exclude']},
  {key:'description',        label:'AA Description',       type:'text'},
  {key:'column1',            label:'AB Column1',           type:'text'},
  {key:'invoice_item',       label:'AC Invoice Item',      type:'select', options:['','Payroll','Management Fee','Expense Reimbursement','Corporate Expense Allocation','Labor Expense Allocation','Vendor Bill Allocation']},
];

// ── STATE ──────────────────────────────────────────────────────────────────
const ST={
  screen:'loading',uploads:[],current:null,rows:[],pairs:[],periods:[],
  view:'hub',statusFilter:'all',search:'',
  selectedPair:null,txPeriod:'',txDesc:'',txSide:'',
  stmtEntity:null,settlementView:'all',settlementEntity:null,jvSection:'start-to-jv',jvSelectedPair:null,invJV:null,invPeriod:null,invPreview:false,
  rawSearch:'',rawPair:'',rawPeriod:'',rawInclude:'',rawPage:0,rawColFilters:{},
  editingCell:null,
  modal:null,
  uploadStatus:null,uploadMsg:'',uploadProgress:0,
};
const PAGE_SIZE=100;

function aggregate(rows){
  const map={};
  rows.filter(r=>!r.include_exclude||r.include_exclude==='Include').forEach(r=>{
    const pair=r.pair_key||'';if(!pair)return;
    if(!map[pair])map[pair]={pair,arByP:{},apByP:{},cur:new Set(),desc:new Set(),per:new Set(),txs:[],who:new Set()};
    const p=map[pair],amt=parseFloat(r.amount)||0;
    p.cur.add(r.currency||'');p.desc.add(r.description||'');p.per.add(r.period||'');
    if(r.who_owes_who)p.who.add(r.who_owes_who);
    if(isAR(r))p.arByP[r.period]=(p.arByP[r.period]||0)+amt;
    else       p.apByP[r.period]=(p.apByP[r.period]||0)+amt;
    p.txs.push({id:r.id,sub:r.sub_name,rel:r.relationship,amt,desc:r.description,per:r.period,
      cur:r.currency,who:r.who_owes_who,doc:r.doc_number,memo:(r.memo||'').slice(0,80),
      isAR:isAR(r),edited:!!r.edited_by});
  });
  ST.pairs=Object.values(map).map(p=>{
    const arT=Object.values(p.arByP).reduce((s,v)=>s+v,0);
    const apT=Object.values(p.apByP).reduce((s,v)=>s+v,0);
    const diff=arT-apT;
    return{pair:p.pair,arT,apT,diff,balanced:Math.abs(diff)<0.02,
      cur:[...p.cur].filter(Boolean).sort(),desc:[...p.desc].filter(Boolean).sort(),
      per:[...p.per].filter(Boolean).sort(sortP),txs:p.txs,
      who:[...new Set([...p.who])],arByP:p.arByP,apByP:p.apByP};
  }).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  ST.periods=[...new Set(rows.map(r=>r.period||'').filter(Boolean))].sort(sortP);
}

function buildHub(){
  const startPairs=ST.pairs.filter(p=>p.pair.includes('START')&&!p.pair.includes('ELIM'));
  const subs={};
  startPairs.forEach(p=>{
    const parts=p.pair.split('|').map(s=>s.trim());
    const other=parts[0]==='START'?parts[1]:parts[0];
    if(!other||other==='START')return;
    if(!subs[other])subs[other]={entity:other,netVsStart:0,pairs:[]};
    const isStartRight=parts[1]==='START';
    subs[other].netVsStart+=isStartRight?p.arT-p.apT:p.apT-p.arT;
    subs[other].pairs.push({pair:p.pair,diff:p.diff,balanced:p.balanced});
  });
  const incoming=Object.values(subs).filter(s=>s.netVsStart>0.02).sort((a,b)=>b.netVsStart-a.netVsStart);
  const outgoing=Object.values(subs).filter(s=>s.netVsStart<-0.02).sort((a,b)=>a.netVsStart-b.netVsStart);
  return{incoming,outgoing,
    totalIn:incoming.reduce((s,e)=>s+e.netVsStart,0),
    totalOut:outgoing.reduce((s,e)=>s+Math.abs(e.netVsStart),0),
    net:incoming.reduce((s,e)=>s+e.netVsStart,0)-outgoing.reduce((s,e)=>s+Math.abs(e.netVsStart),0)};
}


function buildSettlement(){
  const PORD=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function sp(p){const[m,y]=(p||'').split(' ');return(Number(y)||0)*100+(PORD.indexOf(m)>=0?PORD.indexOf(m):0);}

  // Per-entity aggregation across ALL pairs
  const map={};
  ST.rows.forEach(r=>{
    if((r.include_exclude||'Include')==='Exclude')return;
    const sub=r.sub_name||'';if(!sub)return;
    const amt=parseFloat(r.amount)||0;
    const per=r.period||'';
    const pair=r.pair_key||'';
    const ar=isAR(r);
    if(!map[sub])map[sub]={entity:sub,ar:0,ap:0,pairs:{},periods:{},whoOwes:new Set()};
    const e=map[sub];
    if(ar)e.ar+=amt; else e.ap+=amt;
    if(r.who_owes_who)e.whoOwes.add(r.who_owes_who);
    // by pair
    if(!e.pairs[pair])e.pairs[pair]={pair,ar:0,ap:0};
    if(ar)e.pairs[pair].ar+=amt; else e.pairs[pair].ap+=amt;
    // by period
    if(!e.periods[per])e.periods[per]={period:per,ar:0,ap:0};
    if(ar)e.periods[per].ar+=amt; else e.periods[per].ap+=amt;
  });

  return Object.values(map).map(e=>{
    const net=e.ar-e.ap;
    const action=Math.abs(net)<0.02?'Settled':net<0?'Pays':'Receives';
    const pairs=Object.values(e.pairs).sort((a,b)=>Math.abs(b.ar-b.ap)-Math.abs(a.ar-a.ap));
    const periods=Object.values(e.periods).sort((a,b)=>sp(a.period)-sp(b.period));
    return{entity:e.entity,ar:e.ar,ap:e.ap,net,action,pairs,periods,whoOwes:[...e.whoOwes]};
  }).sort((a,b)=>a.net-b.net); // payers first
}

function filtered(){return ST.pairs.filter(p=>{
  if(ST.statusFilter==='unbalanced'&&p.balanced)return false;
  if(ST.statusFilter==='balanced'&&!p.balanced)return false;
  if(ST.search&&!p.pair.toLowerCase().includes(ST.search.toLowerCase()))return false;
  return true;
});}

function payments(){return ST.pairs.filter(p=>!p.balanced).map(p=>{
  const[e1,e2]=(p.pair+'|').split('|').map(s=>s.trim());
  const[payer,payee]=p.diff>0?[e2,e1]:[e1,e2];
  return{pair:p.pair,payer,payee,amt:Math.abs(p.diff),cur:p.cur,per:p.per};
});}

// ── UPLOAD ─────────────────────────────────────────────────────────────────
async function processFile(file){
  ST.uploadStatus='parsing';ST.uploadMsg='Reading file…';ST.uploadProgress=15;render();
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    // prefer RAW DATA sheet, fall back to IntercoReconTransactionsResult
    const sn=wb.SheetNames.find(n=>n==='RAW DATA')||wb.SheetNames.find(n=>n.toLowerCase().includes('interco')&&n.toLowerCase().includes('result'))||wb.SheetNames[0];
    const raw=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''});
    ST.uploadStatus='saving';ST.uploadMsg=`Saving ${raw.length.toLocaleString()} rows…`;ST.uploadProgress=30;render();
    const periods=[...new Set(raw.map(r=>String(r['Period']||'')).filter(Boolean))];
    const[upload]=await api.post('uploads',{file_name:file.name,row_count:raw.length,periods});
    const BATCH=300;
    for(let i=0;i<raw.length;i+=BATCH){
      await api.post('transactions',raw.slice(i,i+BATCH).map(r=>({
        upload_id:upload.id,
        // read-only cols A-P
        subsidiary:       String(r['Subsidiary']||'').slice(0,200),
        internal_id:      String(r['Internal ID']||''),
        tx_date:          String(r['Date']||'').slice(0,20),
        memo:             String(r['Memo (Main)']||'').slice(0,120),
        account:          String(r['Account']||'').slice(0,200),
        amount_functional:parseFloat(r['Amount'])||0,
        amount:           parseFloat(r['Amount (Foreign Currency)'])||0,
        doc_number:       String(r['Document Number']||'').trim(),
        name:             String(r['Name']||'').slice(0,120),
        tx_type:          String(r['Type']||'').trim(),
        site:             String(r['Site']||'').slice(0,120),
        currency:         String(r['Currency']||'').trim(),
        status:           String(r['Status']||'').trim(),
        period:           String(r['Period']||'').trim(),
        status2:          String(r['Status2']||'').trim(),
        memo2:            String(r['Memo']||'').slice(0,120),
        // editable cols Q-AB
        sub_name:          String(r['Sub Name']||'').trim(),
        relationship:      String(r['Relationship']||'').trim(),
        relationship_group:String(r['Relationship Group']||'').trim(),
        pair_key:          String(r['Pair Key']||'').trim(),
        net_ic_balance:    parseFloat(r['Net I/C Balance'])||0,
        ic_name:           String(r['IC Name']||'').trim(),
        who_owes_who:      String(r['Who Owes Who']||'').trim(),
        who_owes:          String(r['Who Owes']||'').trim(),
        who_is_owed:       String(r['Who is Owed']||'').trim(),
        include_exclude:   String(r['Include/Exclude']||'Include').trim(),
        description:       String(r['Description']||'').trim(),
        column1:           String(r['Column1']||'').trim(),
        invoice_item:      String(r['Invoice Item']||'').trim(),
      })));
      ST.uploadProgress=30+Math.round((i/raw.length)*62);
      ST.uploadMsg=`Saving rows ${i+1}–${Math.min(i+BATCH,raw.length)} of ${raw.length.toLocaleString()}…`;
      render();
    }
    ST.uploadStatus='done';ST.uploadMsg='Saved!';ST.uploadProgress=100;render();
    await loadUpload(upload);
  }catch(e){
    console.error('Upload error:', e);
    ST.uploadStatus='error';
    ST.uploadMsg='Upload failed: '+e.message;
    ST.screen='upload';
    try{ render(); } catch(_){
      document.getElementById('root').innerHTML='<div class="app"><div class="loading" style="color:#dc2626"><b>Upload failed</b><br>'+e.message+'<br><br><button class="btn" onclick="location.reload()">Reload app</button></div></div>';
    }
  }
}

async function loadUpload(upload){
  ST.current=upload;
  document.getElementById('root').innerHTML=`<div class="app"><div class="loading"><span class="spin"></span>Loading ${esc(upload.file_name)}…</div></div>`;
  ST.rows=await api.getAll('transactions',`upload_id=eq.${upload.id}`);
  aggregate(ST.rows);
  ST.screen='dashboard';ST.view='hub';ST.selectedPair=null;ST.search='';ST.statusFilter='all';ST.rawPage=0;
  render();
}

async function init(){
  try{
    ST.uploads=await api.get('uploads','order=created_at.desc');
    if(ST.uploads.length===0){ST.screen='upload';ST.uploadStatus=null;render();return;}
    await loadUpload(ST.uploads[0]);
  }catch(e){
    document.getElementById('root').innerHTML=`<div class="app"><div class="loading" style="color:#dc2626">Connection error: ${e.message}</div></div>`;
  }
}

// ── INLINE EDIT ─────────────────────────────────────────────────────────────
function startEdit(id,field,e){
  if(e)e.stopPropagation();
  ST.editingCell={id,field};render();
  setTimeout(()=>{const inp=document.getElementById('ie-'+id+'-'+field);if(inp){inp.focus();if(inp.select)inp.select();}},30);
}

async function commitEdit(id,field){
  const inp=document.getElementById('ie-'+id+'-'+field);
  if(!inp)return;
  const val=inp.value;
  const row=ST.rows.find(r=>r.id===id);
  if(!row){ST.editingCell=null;render();return;}
  const fdef=EDITABLE_COLS.find(f=>f.key===field);
  const newVal=fdef?.type==='number'?parseFloat(val)||0:val;
  if(String(row[field]||'')==String(newVal)){ST.editingCell=null;render();return;}
  // update local row immediately
  row[field]=newVal;row.edited_by='team';row.edited_at=new Date().toISOString();
  await api.patch('transactions',`id=eq.${id}`,{[field]:newVal,edited_by:'team',edited_at:row.edited_at});
  ST.editingCell=null;
  aggregate(ST.rows);
  render();
}

async function refreshRows(){
  if(!ST.current)return;
  const refreshBtn=document.getElementById('inv-refresh');
  if(refreshBtn)refreshBtn.textContent='Refreshing…';
  ST.rows=await api.getAll('transactions',`upload_id=eq.${ST.current.id}`);
  aggregate(ST.rows);
  render();
}

function cancelEdit(){ST.editingCell=null;render();}

function editableCell(row,field,val){
  const id=row.id;
  const isEditing=ST.editingCell&&ST.editingCell.id===id&&ST.editingCell.field===field;
  const isEdited=!!row.edited_by;
  const fdef=EDITABLE_COLS.find(f=>f.key===field);
  if(isEditing){
    if(fdef?.type==='select'){
      return`<select class="inline-edit" id="ie-${id}-${field}"
        onchange="commitEdit('${id}','${field}')"
        onkeydown="if(event.key==='Escape')cancelEdit()">
        ${(fdef.options||[]).map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('')}
      </select>`;
    }
    return`<input class="inline-edit" id="ie-${id}-${field}" type="${fdef?.type||'text'}" value="${esc(val)}"
      onblur="commitEdit('${id}','${field}')"
      onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape')cancelEdit()">`;
  }
  let display;
  if(field==='include_exclude'){
    display=`<span class="${val==='Exclude'?'excl':'incl'}">${esc(val||'Include')}</span>`;
  } else if(field==='invoice_item'&&val){
    display=`<span style="font-size:10px;padding:2px 7px;border-radius:100px;background:#dbeafe;color:#1d4ed8;font-weight:500;white-space:nowrap">${esc(val)}</span>`;
  } else {
    display=`<span class="editable-cell ${isEdited?'edited':''}" title="Click to edit">${esc(val)||'&nbsp;&nbsp;&nbsp;'}</span>`;
  }
  return`<span onclick="startEdit('${id}','${field}',event)">${display}</span>`;
}

// ── EXPORT ───────────────────────────────────────────────────────────────────
function exportExcel(type){
  const wb=XLSX.utils.book_new();
  const allCols=[...READONLY_COLS,...EDITABLE_COLS];
  if(type==='raw'||type==='all'){
    const hdr=allCols.map(c=>c.label);
    const rows=ST.rows.map(r=>allCols.map(c=>r[c.key]??''));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...rows]),'RAW DATA');
  }
  if(type==='jv'||type==='all'){
    const jvd=buildJV();
    html+=`<h2>JV View</h2>`;
    [{label:'START → JV',pairs:jvd.startToJV},{label:'JV → START',pairs:jvd.jvToStart},{label:'JV ↔ JV',pairs:jvd.jvToJV}].forEach(sec=>{
      html+=`<h3>${sec.label} (${sec.pairs.length} pairs)</h3>
      <table><tr><th>Pair</th><th>AR</th><th>AP</th><th>Variance</th><th>Status</th><th>Descriptions</th></tr>
      ${sec.pairs.map(p=>`<tr><td>${esc(p.pair)}</td><td class="ok">$${p.arT.toLocaleString('en-US',{minimumFractionDigits:2})}</td><td class="info">$${p.apT.toLocaleString('en-US',{minimumFractionDigits:2})}</td><td class="${p.balanced?'ok':'warn'}">${p.balanced?'—':'$'+Math.abs(p.diff).toLocaleString('en-US',{minimumFractionDigits:2})}</td><td>${p.balanced?'Balanced':'Variance'}</td><td>${esc(p.desc.join(', '))}</td></tr>`).join('')}
      </table>`;
    });
  }
  if(type==='summary'||type==='all'){
    const hdr=['Pair Key','AR Total','AP Total','Variance','Status','Currencies'];
    const rows=ST.pairs.map(p=>[p.pair,p.arT,p.apT,p.diff,p.balanced?'Balanced':'Variance',p.cur.join(',')]);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...rows]),'Pair Summary');
  }
  if(type==='stmt'||type==='all'){
    const entities=[...new Set(ST.rows.map(r=>r.sub_name).filter(Boolean))].sort();
    entities.forEach(entity=>{
      const txs=ST.rows.filter(r=>r.sub_name===entity);
      const arT=txs.filter(r=>isAR(r)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
      const apT=txs.filter(r=>!isAR(r)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
      const hdr=['Pair Key','Relationship','Amount','Currency','Period','Description','Doc #','Memo','Who Owes Who'];
      const rows=txs.map(r=>[r.pair_key,r.relationship,r.amount,r.currency,r.period,r.description,r.doc_number,r.memo,r.who_owes_who]);
      const ws=XLSX.utils.aoa_to_sheet([[`Statement: ${entity}`],['AR Total',arT],['AP Total',apT],['Net',arT-apT],[],[...hdr],...rows]);
      XLSX.utils.book_append_sheet(wb,ws,entity.replace(/[\\/*?[\]]/g,'').slice(0,28));
    });
  }
  if(type==='hub'||type==='all'){
    const hub=buildHub();
    const hdr=['Direction','Entity','Net vs START','Balanced'];
    const rows=[...hub.incoming.map(e=>['Incoming',e.entity,e.netVsStart,e.pairs.every(p=>p.balanced)?'Yes':'No']),
      ...hub.outgoing.map(e=>['Outgoing',e.entity,Math.abs(e.netVsStart),e.pairs.every(p=>p.balanced)?'Yes':'No'])];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...rows]),'START Hub');
  }
  if(type==='jv'||type==='all'){
    const jvd=buildJV();
    const sections=[
      {label:'START to JV', pairs:jvd.startToJV},
      {label:'JV to START', pairs:jvd.jvToStart},
      {label:'JV to JV',    pairs:jvd.jvToJV},
    ];
    sections.forEach(sec=>{
      const hdr=['Pair','AR Total','AP Total','Variance','Status','Currencies','Descriptions'];
      const rows=sec.pairs.map(p=>[p.pair,p.arT,p.apT,p.diff,p.balanced?'Balanced':'Variance',p.cur.join(','),p.desc.join(',')]);
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...rows]),sec.label);
    });
  }
  if(type==='settlement'||type==='all'){
    const sdata=buildSettlement();
    // Summary tab
    const hdr=['Entity','AR (Owed To)','AP (Owes)','Net Position','Action','Pairs'];
    const rows=sdata.map(e=>[e.entity,e.ar,e.ap,e.net,e.action,e.pairs.length]);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...rows]),'Settlement Summary');
    // Payment schedule tab
    const phdr=['Entity','Period','AR','AP','Net','Action'];
    const prows=sdata.flatMap(e=>e.periods.map(p=>[e.entity,p.period,p.ar,p.ap,p.ar-p.ap,p.ar-p.ap<-0.02?'Pays':p.ar-p.ap>0.02?'Receives':'Settled']));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([phdr,...prows]),'Payment Schedule');
  }
  XLSX.writeFile(wb,`IntercoRecon_${new Date().toISOString().slice(0,10)}.xlsx`);
  closeDropdown();
}

function closeDropdown(){document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('open'));}
function toggleDd(id){const m=document.getElementById(id);document.querySelectorAll('.dropdown-menu').forEach(x=>{if(x.id!==id)x.classList.remove('open');});m.classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.dropdown-wrap'))closeDropdown();});

}

function buildJV(){
  // Classify pairs: START→JV, JV→START, JV→JV (no ELIM)
  const isStart = e => e==='START'||e==='START ELIM';
  const startToJV=[], jvToStart=[], jvToJV=[];

  ST.pairs.forEach(p=>{
    const parts=p.pair.split('|').map(s=>s.trim());
    if(parts.length!==2)return;
    const[e1,e2]=parts;
    if(p.pair.includes('ELIM'))return;
    const s1=isStart(e1),s2=isStart(e2);
    if(s1&&!s2) startToJV.push(p);
    else if(!s1&&s2) jvToStart.push(p);
    else if(!s1&&!s2) jvToJV.push(p);
  });

  // For each section build entity-level net positions
  function entityNets(pairs){
    const map={};
    pairs.forEach(p=>{
      const parts=p.pair.split('|').map(s=>s.trim());
      const[e1,e2]=parts;
      [e1,e2].forEach(e=>{
        if(!map[e])map[e]={entity:e,ar:0,ap:0,pairs:[]};
      });
      map[e1].ar+=p.arT; map[e1].ap+=p.apT;
      map[e2].ar+=p.apT; map[e2].ap+=p.arT; // mirror
      map[e1].pairs.push(p); map[e2].pairs.push(p);
    });
    return Object.values(map).sort((a,b)=>Math.abs(b.ar-b.ap)-Math.abs(a.ar-a.ap));
  }

  return{
    startToJV,jvToStart,jvToJV,
    startToJVNets:entityNets(startToJV),
    jvToStartNets:entityNets(jvToStart),
    jvToJVNets:entityNets(jvToJV),
    totalStartToJV:startToJV.reduce((s,p)=>s+p.arT,0),
    totalJVToStart:jvToStart.reduce((s,p)=>s+p.arT,0),
    totalJVToJV:jvToJV.reduce((s,p)=>s+(p.arT+p.apT)/2,0),
    unbalStartToJV:startToJV.filter(p=>!p.balanced).length,
    unbalJVToStart:jvToStart.filter(p=>!p.balanced).length,
    unbalJVToJV:jvToJV.filter(p=>!p.balanced).length,
  };
}

function renderSettlement(){
  const data=buildSettlement();
  const payers=data.filter(e=>e.action==='Pays');
  const receivers=data.filter(e=>e.action==='Receives');

  // filter for detail panel

  function entityRow(e,highlight){

      <td class="num info">${fmt(e.ap)}</td>
      <td class="num" style="font-weight:700;color:${netColor};background:${netBg};border-radius:4px;padding:3px 8px">

  else if(ST.settlementView==='receivers') tableRows=receivers.map(e=>entityRow(e)).join('');
  else if(ST.settlementView==='variance') tableRows=''; // handled separately
  else tableRows=[...payers,...settled,...receivers].map(e=>entityRow(e)).join('');

  return`

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:1rem">

        const[payer,payee]=p.diff>0?[e2,e1]:[e1,e2];
        return`<tr class="clickable" onclick="ST.settlementEntity='${esc(payer)}';ST.settlementView='all';render()">

    </table></div>
  </div>`:''}

  <!-- Entity detail panel -->

    <!-- Entity totals -->

      ${[
        ['Total AR (owed to entity)',fmt(sel.ar),'ok'],
        ['Total AP (entity owes)',fmt(sel.ap),'info'],
        ['Net position',`${sel.action==='Pays'?'−':'+'}${fmt(Math.abs(sel.net))}`,sel.action==='Pays'?'warn':'ok'],
        ['Action',sel.action==='Pays'?'↑ Pays START':sel.action==='Receives'?'↓ Receives':'✓ Settled',sel.action==='Pays'?'warn':sel.action==='Receives'?'ok':'muted'],
      ].map(([l,v,c])=>`

function renderStatements(){
  const entities=[...new Set(ST.rows.map(r=>r.sub_name).filter(Boolean))].sort();
  const stmtRows=ST.stmtEntity?ST.rows.filter(r=>r.sub_name===ST.stmtEntity):[];

  // Totals for header
  const arT=stmtRows.filter(r=>isAR(r)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const apT=stmtRows.filter(r=>!isAR(r)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);

  // Group by pair key, then within each pair roll up by period + description
  const byPair={};
  stmtRows.forEach(r=>{
    const pk=r.pair_key||'Other';
    if(!byPair[pk])byPair[pk]={pair:pk,txs:[],arT:0,apT:0};
    const a=parseFloat(r.amount)||0;
    if(isAR(r))byPair[pk].arT+=a; else byPair[pk].apT+=a;
    byPair[pk].txs.push(r);
  });

  // Roll up txs within a pair by period + description + side (AR/AP)
  function rollup(txs){
    const map={};
    txs.forEach(r=>{
      const side=isAR(r)?'AR':'AP';
      const key=`${r.period||''}||${r.description||''}||${side}`;
      if(!map[key]){
        map[key]={
          period:r.period||'',
          description:r.description||'',
          side,
          isAR:isAR(r),
          currency:r.currency||'',
          amount:0,
          count:0,
          who_owes_who:r.who_owes_who||'',
          relationship:r.relationship||'',
        };
      }
      map[key].amount+=(parseFloat(r.amount)||0);
      map[key].count+=1;
      // keep currency if consistent
      if(map[key].currency!==r.currency) map[key].currency='Mixed';
    });
    // Sort by period then description
    return Object.values(map).sort((a,b)=>{
      const ps=sortP(a.period||'',b.period||'');
      if(ps!==0)return ps;
      return(a.description||'').localeCompare(b.description||'');
    });
  }

  return`<div class="filters">
    <select onchange="ST.stmtEntity=this.value;render()" style="width:200px">
      <option value="">Select entity…</option>
      ${entities.map(e=>`<option value="${esc(e)}" ${ST.stmtEntity===e?'selected':''}>${esc(e)}</option>`).join('')}
    </select>
    ${ST.stmtEntity?`
      <button class="btn-blue" onclick="exportPDF('stmt')">⬇ PDF</button>
      <button class="btn-green" onclick="exportExcel('stmt')">⬇ Excel</button>`:''}
  </div>

  ${!ST.stmtEntity?'<div class="card"><div class="empty">Select an entity to view its statement</div></div>':''}

  ${ST.stmtEntity?`
  <div class="card">
    <div class="stmt-entity-head">
      <span>${esc(ST.stmtEntity)} — Intercompany Statement</span>
      <div style="display:flex;gap:20px;font-size:12px;flex-wrap:wrap">
        <span>AR Total: <strong class="ok">${fmt(arT)}</strong></span>
        <span>AP Total: <strong class="info">${fmt(apT)}</strong></span>
        <span>Net: <strong class="${arT-apT>=0?'ok':'warn'}">${fmtD(arT-apT)}</strong></span>
        <span class="muted">${stmtRows.length} transactions across ${Object.keys(byPair).length} pairs</span>
      </div>
    </div>

    ${Object.values(byPair).map(group=>{
      const rolled=rollup(group.txs);
      const periods=[...new Set(rolled.map(r=>r.period))].sort(sortP);

      // Period subtotals
      const periodTotals={};
      rolled.forEach(r=>{
        if(!periodTotals[r.period])periodTotals[r.period]={ar:0,ap:0};
        if(r.isAR)periodTotals[r.period].ar+=r.amount;
        else      periodTotals[r.period].ap+=r.amount;
      });

      return`
      <div class="stmt-section-head" style="display:flex;justify-content:space-between;align-items:center">
        <span>${esc(group.pair)}</span>
        <span style="font-size:11px;font-weight:400">
          AR: <span class="ok">${fmt(group.arT)}</span> &nbsp;
          AP: <span class="info">${fmt(group.apT)}</span> &nbsp;
          Net: <span class="${Math.abs(group.arT-group.apT)<0.02?'ok':group.arT-group.apT>0?'ok':'warn'}">${fmtD(group.arT-group.apT)}</span>
        </span>
      </div>

      <div class="scroll-x">
      <table>
        <thead>
          <tr>
            <th style="min-width:80px">Period</th>
            <th style="min-width:180px">Description</th>
            <th style="min-width:70px">Side</th>
            <th style="min-width:80px">Relationship</th>
            <th class="num" style="min-width:110px">Amount</th>

function renderRaw(){

  // apply all filters
  let rows=ST.rows;
  if(ST.rawPair)   rows=rows.filter(r=>r.pair_key===ST.rawPair);
  if(ST.rawPeriod) rows=rows.filter(r=>r.period===ST.rawPeriod);
  if(ST.rawInclude)rows=rows.filter(r=>(r.include_exclude||'Include')===ST.rawInclude);
  if(ST.rawSearch) rows=rows.filter(r=>Object.values(r).join(' ').toLowerCase().includes(ST.rawSearch.toLowerCase()));

  const total=rows.length,pages=Math.ceil(total/PAGE_SIZE)||1;

// ── INVOICE DESCRIPTIONS ──────────────────────────────────────────────────
const ITEM_DESCRIPTIONS={
  'Payroll':'Allocation of payroll-related costs from Corporate to the JV for the applicable billing period.',
  'Management Fee':'Management fee charged in accordance with the Master Services Agreement, calculated as 10% of revenue for the applicable billing period.',
  'Expense Reimbursement':'Reimbursement of corporate-incurred expenses (including AMEX/credit card charges) allocated to the JV for the applicable billing period.',
  'Corporate Expense Allocation':'Allocation of corporate-incurred operating expenses (including technology, marketing, and administrative costs) to the JV for the applicable billing period.',
  'Labor Expense Allocation':'Allocation of corporate-incurred labor expenses to the JV for the applicable billing period.',
  'Vendor Bill Allocation':'', // dynamically built from memos
};

const ITEM_ORDER=['Payroll','Management Fee','Expense Reimbursement','Corporate Expense Allocation','Labor Expense Allocation','Vendor Bill Allocation'];

function buildInvoiceData(jvEntity, period){
  // Step 1: find ALL rows for this pair (both AR and AP sides, both sub_names)
  // that have been tagged with an invoice_item
  const pairKey1 = `${jvEntity} | START`;
  const pairKey2 = `START | ${jvEntity}`;

  const taggedRows = ST.rows.filter(r=>{
    const inPair = r.pair_key===pairKey1 || r.pair_key===pairKey2 ||
                   r.sub_name===jvEntity || r.sub_name==='START';
    const inPairKey = r.pair_key===pairKey1 || r.pair_key===pairKey2;
    const isThisPeriod = !period || r.period===period;
    return inPairKey && isThisPeriod && r.invoice_item;
  });

  // Step 2: get the unique invoice items from tagged rows (either side)
  const taggedItems = [...new Set(taggedRows.map(r=>r.invoice_item).filter(Boolean))];

  // Step 3: for each tagged item, find the AR side rows to get the correct amount
  // AR rows = START's receivable = what START is billing to the JV
  const map = {};
  taggedItems.forEach(item => {
    // Find AR rows for this item in this pair/period
    const arRows = ST.rows.filter(r=>{
      const inPairKey = r.pair_key===pairKey1 || r.pair_key===pairKey2;
      const isThisPeriod = !period || r.period===period;
      const itemMatch = r.invoice_item === item ||
        // also match by description if item not tagged on AR side
        descMatchesItem(r.description, item);
      return inPairKey && isThisPeriod && isAR(r) && itemMatch;
    });

    // If no AR rows tagged directly, fall back to AP tagged rows amounts
    const apTaggedRows = taggedRows.filter(r=>r.invoice_item===item && !isAR(r));
    const arTaggedRows = taggedRows.filter(r=>r.invoice_item===item && isAR(r));

    let amount = 0;
    let memos = [];

    if(arTaggedRows.length > 0){
      // Use directly tagged AR rows
      amount = arTaggedRows.reduce((s,r)=>s+(parseFloat(r.amount)||0), 0);
      memos = arTaggedRows.map(r=>r.memo).filter(Boolean);
    } else if(arRows.length > 0){
      // Use AR rows matched by description
      amount = arRows.reduce((s,r)=>s+(parseFloat(r.amount)||0), 0);
      memos = arRows.map(r=>r.memo).filter(Boolean);
    } else {
      // Fall back to AP tagged rows (mirror = same amount)
      amount = apTaggedRows.reduce((s,r)=>s+(parseFloat(r.amount)||0), 0);
      memos = apTaggedRows.map(r=>r.memo).filter(Boolean);
    }

    if(!map[item]) map[item] = {item, amount:0, memos:[]};
    map[item].amount += amount;
    memos.forEach(m=>{ if(m && !map[item].memos.includes(m)) map[item].memos.push(m); });
  });

  // Step 4: sort by ITEM_ORDER and build descriptions
  return ITEM_ORDER.filter(i=>map[i]).map(i=>({
    item: i,
    amount: map[i].amount,
    description: i==='Vendor Bill Allocation'
      ? map[i].memos.map(m=>`Vendor Bill allocation ${m}`).join('\n')
      : ITEM_DESCRIPTIONS[i],
  }));
}

function descMatchesItem(desc, item){
  if(!desc || !item) return false;
  const d = desc.toLowerCase();
  const it = item.toLowerCase();
  if(it==='payroll' && (d.includes('payroll'))) return true;
  if(it==='management fee' && d.includes('management fee')) return true;
  if(it==='expense reimbursement' && (d.includes('credit card') || d.includes('expense pushdown'))) return true;
  if(it==='corporate expense allocation' && d.includes('expense pushdown')) return true;
  if(it==='labor expense allocation' && d.includes('labor pushdown')) return true;
  if(it==='vendor bill allocation' && d.includes('vendor bill')) return true;
  return false;
}


function buildInvoiceNumber(jvEntity, period){
  if(!period)return'';
  const[mon,yr]=period.split(' ');
  const MNUM={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const short=(jvEntity||'').replace(/\s/g,'').toUpperCase().slice(0,4);
  return`${MNUM[mon]||'00'}${yr}Interco${short}`;
}

          <div style="background:#f5f5f3;border-radius:8px;padding:10px 12px;font-size:12px">
            <div style="font-weight:500;margin-bottom:4px">Invoice #</div>
            <div style="font-family:monospace;color:#2563eb">${invNum}</div>
          </div>
          <div style="background:${taggedCount===0?'#fef2f2':taggedCount<totalRows?'#fef3c7':'#f0fdf4'};border-radius:8px;padding:10px 12px;font-size:12px">
            <div style="font-weight:500;margin-bottom:2px;color:${taggedCount===0?'#dc2626':taggedCount<totalRows?'#d97706':'#16a34a'}">
              ${taggedCount===0?'⚠ No rows tagged yet':taggedCount<totalRows?`⚠ ${taggedCount} of ${totalRows} AR rows tagged`:`✓ ${taggedCount} rows tagged`}
            </div>
            <div style="color:#666">Tag rows in Raw Data tab using the AC Invoice Item column</div>
          </div>
          <button class="btn-dark" style="width:100%;padding:10px;font-size:13px;justify-content:center;display:flex;align-items:center;gap:6px" onclick="downloadInvoice()">
            🖨 Print / Download PDF
          </button>`:''}
        </div>
      </div>

      <div class="card">
        <div class="card-head"><span class="card-title">Item descriptions</span></div>
        <div style="padding:10px 14px">
          ${ITEM_ORDER.map(item=>`
          <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:0.5px solid #f0f0f0">
            <div style="font-size:11px;font-weight:600;margin-bottom:2px">${esc(item)}</div>
            <div style="font-size:10px;color:#666;line-height:1.5">${esc(item==='Vendor Bill Allocation'?'Built dynamically from memo field':ITEM_DESCRIPTIONS[item])}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Right: live invoice preview -->
    <div>
      ${(!ST.invJV||!ST.invPeriod)?`<div class="card"><div class="empty" style="padding:4rem">Select a JV entity and period on the left to preview the invoice</div></div>`:`
      <div class="card" style="border:0.5px solid #111">
        <div class="card-head">
          <span class="card-title">Invoice preview — ${esc(ST.invJV)} · ${esc(ST.invPeriod)}</span>
        </div>
        <!-- Invoice body -->
        <div style="padding:28px 32px;background:#fff">

          <!-- Header -->
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
            <div style="font-size:12px;line-height:1.7">
              <div style="font-size:14px;font-weight:600;margin-bottom:3px">SOUTH Texas Accelerated Research Therapeutics, LP</div>
              4383 Medical Drive, Suite 4021<br>San Antonio TX, 78229, US<br>Tax ID #: 39-2392479
            </div>
            <div style="text-align:right">
              <div style="font-size:26px;font-weight:700;letter-spacing:-1px">INVOICE</div>
              <table style="margin-left:auto;border-collapse:collapse;font-size:11px;margin-top:6px">
                <tr>
                  <td style="background:#f0f0f0;font-weight:600;padding:3px 8px;border:0.5px solid #ccc">DATE</td>
                  <td style="background:#f0f0f0;font-weight:600;padding:3px 8px;border:0.5px solid #ccc">INVOICE #</td>
                </tr>
                <tr>
                  <td style="padding:3px 8px;border:0.5px solid #ccc">${today}</td>
                  <td style="padding:3px 8px;border:0.5px solid #ccc">${invNum}</td>
                </tr>
                <tr>
                  <td colspan="2" style="padding:3px 8px;border:0.5px solid #ccc;font-weight:600;color:#555">Due: Net 30 Days</td>
                </tr>
              </table>
            </div>
          </div>

          <!-- Bill to -->
          <div style="display:flex;justify-content:space-between;padding:12px 0;border-top:1px solid #ccc;border-bottom:1px solid #ccc;margin-bottom:16px;font-size:11px">
            <div>
              <div style="font-weight:700;margin-bottom:4px;font-size:12px">BILL TO</div>
              <div style="font-weight:500">${esc(ST.invJV)}</div>
              4383 Medical Drive, Suite 4021<br>San Antonio TX, 78229, US<br>ap@startresearch.com
            </div>
          </div>

          <div style="font-size:12px;font-weight:500;margin-bottom:14px">Billing Period: ${esc(ST.invPeriod)}</div>

          <!-- Items table -->
          <table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:0">
            <thead>
              <tr style="background:#222;color:#fff">
                <th style="padding:7px 10px;text-align:left;width:150px">Item</th>
                <th style="padding:7px 10px;text-align:left">Description</th>
                <th style="padding:7px 10px;text-align:right;width:120px">COST</th>
              </tr>
            </thead>
            <tbody>
              ${items.length?items.map(i=>`<tr style="border-bottom:0.5px solid #e5e5e5">
                <td style="padding:8px 10px;font-weight:600;vertical-align:top">${esc(i.item)}</td>
                <td style="padding:8px 10px;color:#444;line-height:1.5;white-space:pre-line;vertical-align:top">${esc(i.description)}</td>
                <td style="padding:8px 10px;text-align:right;font-variant-numeric:tabular-nums;vertical-align:top">$${i.amount.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
              </tr>`).join('')
              :`<tr><td colspan="3" style="padding:20px 10px;text-align:center;color:#999;font-style:italic">No tagged rows found — go to Raw Data and set Invoice Item for AR rows</td></tr>`}
            </tbody>
          </table>

          <!-- Total -->
          <div style="display:flex;justify-content:flex-end;border-top:2px solid #111;padding-top:2px">
            <div style="display:flex;gap:0">
              <div style="font-weight:700;font-size:13px;padding:10px 16px;border-right:0.5px solid #ccc">TOTAL DUE</div>
              <div style="font-weight:700;font-size:14px;padding:10px 16px;font-variant-numeric:tabular-nums;color:${items.length?'#111':'#999'}">
                $${total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
              </div>
            </div>
          </div>

          <!-- Payment -->
          <div style="margin-top:20px;padding-top:14px;border-top:1px solid #ccc;font-size:11px;line-height:1.9">
            <div style="font-weight:700;font-size:12px;margin-bottom:4px">Please remit payment via ACH to:</div>
            START, LP - Operating Account<br>
            Bank Name: JPMorgan Chase Bank, N.A. - Texas<br>
            Bank Account Number: 663066366<br>
            ACH Routing Number: 111000614<br><br>
            If you have any questions about this invoice, please contact Yahira Melgard<br>
            yahira.melgard@startresearch.com
          </div>
        </div>
      </div>`}
    </div>
  </div>`;
}


init();
</script>
