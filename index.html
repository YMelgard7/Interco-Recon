<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interco Recon — Evolve2Impact</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;color:#111;min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:1.5rem 1rem}
button,select,input,textarea{font-family:inherit}
.btn{font-size:12px;padding:5px 11px;border-radius:7px;border:0.5px solid #d4d4d4;background:#fff;color:#111;cursor:pointer}
.btn:hover{background:#f5f5f3}
.btn-dark{font-size:12px;padding:6px 14px;border-radius:7px;border:none;background:#111;color:#fff;cursor:pointer;font-weight:500}
.btn-green{font-size:12px;padding:5px 11px;border-radius:7px;border:none;background:#16a34a;color:#fff;cursor:pointer}
.btn-blue{font-size:12px;padding:5px 11px;border-radius:7px;border:none;background:#2563eb;color:#fff;cursor:pointer}
.btn-sm{font-size:11px;padding:3px 7px;border-radius:5px;border:0.5px solid #d4d4d4;background:#fff;color:#111;cursor:pointer}
.card{background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;overflow:hidden;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-head{padding:10px 16px;border-bottom:0.5px solid #e5e5e5;background:#fafafa;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:500}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1rem}
.metric{background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:10px 12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.metric-label{font-size:11px;color:#666;margin-bottom:3px}
.metric-val{font-size:18px;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 8px;font-size:11px;font-weight:500;color:#666;border-bottom:0.5px solid #e5e5e5;white-space:nowrap;background:#fafafa;position:sticky;top:0;z-index:1}
td{padding:6px 8px;border-bottom:0.5px solid #f0f0f0;vertical-align:middle}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:#fafafa}
tr.selected td{background:#f5f5f3!important}
.num{text-align:right;font-variant-numeric:tabular-nums}
.ok{color:#16a34a}.warn{color:#dc2626}.info{color:#2563eb}.muted{color:#888}
.scroll-x{overflow-x:auto}
.scroll-y{overflow-y:auto;max-height:420px}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{font-size:12px;padding:5px 12px;border-radius:8px;border:0.5px solid #d4d4d4;background:#fff;color:#555;cursor:pointer;transition:all .12s;white-space:nowrap}
.tab:hover{background:#f5f5f3;color:#111}
.tab.active{background:#111;color:#fff;border-color:#111;font-weight:500}
select,input[type=text],input[type=search],input[type=number]{font-size:12px;padding:5px 8px;border-radius:7px;border:0.5px solid #d4d4d4;background:#fff;color:#111}
textarea{font-size:12px;padding:7px 9px;border-radius:7px;border:0.5px solid #d4d4d4;background:#fff;color:#111;resize:vertical;min-height:56px;width:100%}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.pill{font-size:11px;padding:2px 7px;border-radius:100px;border:0.5px solid #e5e5e5;color:#666;background:#fafafa;white-space:nowrap;display:inline-block}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #e5e5e5;border-top-color:#111;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{padding:3rem;text-align:center;color:#666;font-size:13px}
.empty{padding:1.5rem;text-align:center;color:#999;font-size:12px}
.drop-zone{border:2px dashed #d4d4d4;border-radius:12px;padding:2.5rem 2rem;text-align:center;cursor:pointer;transition:all .15s;background:#fff}
.drop-zone:hover,.drop-zone.drag{border-color:#111;background:#f5f5f3}
.upload-wrap{max-width:520px;margin:3.5rem auto;padding:0 1rem}
.progress-bar{height:4px;background:#e5e5e5;border-radius:4px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:#111;border-radius:4px;transition:width .25s}
.hub-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
@media(max-width:640px){.hub-row{grid-template-columns:1fr}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;overflow-y:auto}
.modal{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:460px;box-shadow:0 8px 40px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:500;margin-bottom:14px}
.form-row{margin-bottom:12px}
.form-label{font-size:11px;color:#666;margin-bottom:4px;display:block}
.editable-cell{cursor:pointer;border-bottom:1px dashed #bbb;padding:1px 3px;border-radius:3px;display:inline-block;min-width:40px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.editable-cell:hover{background:#f0f9ff;border-color:#2563eb}
.editable-cell.edited{background:#fef9c3;border-color:#ca8a04}
.inline-edit{font-size:12px;padding:2px 5px;border-radius:4px;border:1.5px solid #2563eb;background:#fff;color:#111;width:120px}
.stmt-entity-head{background:#f0fdf4;border-left:3px solid #16a34a;padding:10px 14px;font-weight:500;font-size:13px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.stmt-section-head{background:#fafafa;padding:7px 14px;font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid #e5e5e5}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.dropdown-wrap{position:relative;display:inline-block}
.dropdown-menu{display:none;position:absolute;right:0;top:110%;background:#fff;border:0.5px solid #e5e5e5;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:50;min-width:170px;padding:4px}
.dropdown-menu.open{display:block}
.dd-item{padding:7px 12px;cursor:pointer;font-size:12px;border-radius:6px;white-space:nowrap}
.dd-item:hover{background:#f5f5f3}
.incl{color:#16a34a;font-size:11px;font-weight:500}
.excl{color:#dc2626;font-size:11px;font-weight:500}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPA_URL='https://zwinmrqclkefpsfedwgg.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3aW5tcnFjbGtlZnBzZmVkd2dnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjY5MzUsImV4cCI6MjA5NjEwMjkzNX0.1uQY3ypn9223gDAWodnqmW82gfNBFo-whBhl4GMU5Dw';
const H={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
const api={
  get:async(t,p='')=>{const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json()},
  post:async(t,b)=>{const r=await fetch(`${SUPA_URL}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json()},
  patch:async(t,p,b)=>{const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json()},
  del:async(t,p)=>{const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text())}
};

const fmt=v=>'$'+Math.abs(Number(v)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=v=>{if(Math.abs(v)<0.02)return'<span class="ok">—</span>';return`<span class="warn">${v>0?'+':'-'}${fmt(v)}</span>`;};
const isAR=r=>r.relationship&&(r.relationship.includes('A/R')||r.relationship.toLowerCase().includes('due from'));
const PORD=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const sortP=(a,b)=>{const[am,ay]=a.split(' '),[bm,by]=b.split(' ');return ay!==by?Number(ay)-Number(by):PORD.indexOf(am)-PORD.indexOf(bm);};
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// A-P = read-only (cols 1-16), Q-AB = editable (cols 17-28)
const READONLY_COLS=[
  {key:'subsidiary',    label:'A Subsidiary'},
  {key:'internal_id',   label:'B Internal ID'},
  {key:'tx_date',       label:'C Date'},
  {key:'memo',          label:'D Memo (Main)'},
  {key:'account',       label:'E Account'},
  {key:'amount_functional', label:'F Amount'},
  {key:'amount',        label:'G Amt (FC)'},
  {key:'doc_number',    label:'H Doc Number'},
  {key:'name',          label:'I Name'},
  {key:'tx_type',       label:'J Type'},
  {key:'site',          label:'K Site'},
  {key:'currency',      label:'L Currency'},
  {key:'status',        label:'M Status'},
  {key:'period',        label:'N Period'},
  {key:'status2',       label:'O Status2'},
  {key:'memo2',         label:'P Memo'},
];
const EDITABLE_COLS=[
  {key:'sub_name',           label:'Q Sub Name',          type:'text'},
  {key:'relationship',       label:'R Relationship',       type:'text'},
  {key:'relationship_group', label:'S Rel Group',          type:'text'},
  {key:'pair_key',           label:'T Pair Key',           type:'text'},
  {key:'net_ic_balance',     label:'U Net I/C Balance',    type:'number'},
  {key:'ic_name',            label:'V IC Name',            type:'text'},
  {key:'who_owes_who',       label:'W Who Owes Who',       type:'text'},
  {key:'who_owes',           label:'X Who Owes',           type:'text'},
  {key:'who_is_owed',        label:'Y Who Is Owed',        type:'text'},
  {key:'include_exclude',    label:'Z Include/Exclude',    type:'select',options:['Include','Exclude']},
  {key:'description',        label:'AA Description',       type:'text'},
  {key:'column1',            label:'AB Column1',           type:'text'},
];

// ── STATE ──────────────────────────────────────────────────────────────────
const ST={
  screen:'loading',uploads:[],current:null,rows:[],pairs:[],periods:[],
  view:'hub',statusFilter:'all',search:'',
  selectedPair:null,txPeriod:'',txDesc:'',txSide:'',
  stmtEntity:null,
  rawSearch:'',rawPair:'',rawPeriod:'',rawInclude:'',rawPage:0,rawColFilters:{},
  editingCell:null,
  modal:null,
  uploadStatus:null,uploadMsg:'',uploadProgress:0,
};
const PAGE_SIZE=100;

function aggregate(rows){
  const map={};
  rows.filter(r=>!r.include_exclude||r.include_exclude==='Include').forEach(r=>{
    const pair=r.pair_key||'';if(!pair)return;
    if(!map[pair])map[pair]={pair,arByP:{},apByP:{},cur:new Set(),desc:new Set(),per:new Set(),txs:[],who:new Set()};
    const p=map[pair],amt=parseFloat(r.amount)||0;
    p.cur.add(r.currency||'');p.desc.add(r.description||'');p.per.add(r.period||'');
    if(r.who_owes_who)p.who.add(r.who_owes_who);
    if(isAR(r))p.arByP[r.period]=(p.arByP[r.period]||0)+amt;
    else       p.apByP[r.period]=(p.apByP[r.period]||0)+amt;
    p.txs.push({id:r.id,sub:r.sub_name,rel:r.relationship,amt,desc:r.description,per:r.period,
      cur:r.currency,who:r.who_owes_who,doc:r.doc_number,memo:(r.memo||'').slice(0,80),
      isAR:isAR(r),edited:!!r.edited_by});
  });
  ST.pairs=Object.values(map).map(p=>{
    const arT=Object.values(p.arByP).reduce((s,v)=>s+v,0);
    const apT=Object.values(p.apByP).reduce((s,v)=>s+v,0);
    const diff=arT-apT;
    return{pair:p.pair,arT,apT,diff,balanced:Math.abs(diff)<0.02,
      cur:[...p.cur].filter(Boolean).sort(),desc:[...p.desc].filter(Boolean).sort(),
      per:[...p.per].filter(Boolean).sort(sortP),txs:p.txs,
      who:[...new Set([...p.who])],arByP:p.arByP,apByP:p.apByP};
  }).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  ST.periods=[...new Set(rows.map(r=>r.period||'').filter(Boolean))].sort(sortP);
}

function buildHub(){
  const startPairs=ST.pairs.filter(p=>p.pair.includes('START')&&!p.pair.includes('ELIM'));
  const subs={};
  startPairs.forEach(p=>{
    const parts=p.pair.split('|').map(s=>s.trim());
    const other=parts[0]==='START'?parts[1]:parts[0];
    if(!other||other==='START')return;
    if(!subs[other])subs[other]={entity:other,netVsStart:0,pairs:[]};
    const isStartRight=parts[1]==='START';
    subs[other].netVsStart+=isStartRight?p.arT-p.apT:p.apT-p.arT;
    subs[other].pairs.push({pair:p.pair,diff:p.diff,balanced:p.balanced});
  });
  const incoming=Object.values(subs).filter(s=>s.netVsStart>0.02).sort((a,b)=>b.netVsStart-a.netVsStart);
  const outgoing=Object.values(subs).filter(s=>s.netVsStart<-0.02).sort((a,b)=>a.netVsStart-b.netVsStart);
  return{incoming,outgoing,
    totalIn:incoming.reduce((s,e)=>s+e.netVsStart,0),
    totalOut:outgoing.reduce((s,e)=>s+Math.abs(e.netVsStart),0),
    net:incoming.reduce((s,e)=>s+e.netVsStart,0)-outgoing.reduce((s,e)=>s+Math.abs(e.netVsStart),0)};
}

function filtered(){return ST.pairs.filter(p=>{
  if(ST.statusFilter==='unbalanced'&&p.balanced)return false;
  if(ST.statusFilter==='balanced'&&!p.balanced)return false;
  if(ST.search&&!p.pair.toLowerCase().includes(ST.search.toLowerCase()))return false;
  return true;
});}

function payments(){return ST.pairs.filter(p=>!p.balanced).map(p=>{
  const[e1,e2]=(p.pair+'|').split('|').map(s=>s.trim());
  const[payer,payee]=p.diff>0?[e2,e1]:[e1,e2];
  return{pair:p.pair,payer,payee,amt:Math.abs(p.diff),cur:p.cur,per:p.per};
});}

// ── UPLOAD ─────────────────────────────────────────────────────────────────
async function processFile(file){
  ST.uploadStatus='parsing';ST.uploadMsg='Reading file…';ST.uploadProgress=15;render();
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    // prefer RAW DATA sheet, fall back to IntercoReconTransactionsResult
    const sn=wb.SheetNames.find(n=>n==='RAW DATA')||wb.SheetNames.find(n=>n.toLowerCase().includes('interco')&&n.toLowerCase().includes('result'))||wb.SheetNames[0];
    const raw=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''});
    ST.uploadStatus='saving';ST.uploadMsg=`Saving ${raw.length.toLocaleString()} rows…`;ST.uploadProgress=30;render();
    const periods=[...new Set(raw.map(r=>String(r['Period']||'')).filter(Boolean))];
    const[upload]=await api.post('uploads',{file_name:file.name,row_count:raw.length,periods});
    const BATCH=300;
    for(let i=0;i<raw.length;i+=BATCH){
      await api.post('transactions',raw.slice(i,i+BATCH).map(r=>({
        upload_id:upload.id,
        // read-only cols A-P
        subsidiary:       String(r['Subsidiary']||'').slice(0,200),
        internal_id:      String(r['Internal ID']||''),
        tx_date:          String(r['Date']||'').slice(0,20),
        memo:             String(r['Memo (Main)']||'').slice(0,120),
        account:          String(r['Account']||'').slice(0,200),
        amount_functional:parseFloat(r['Amount'])||0,
        amount:           parseFloat(r['Amount (Foreign Currency)'])||0,
        doc_number:       String(r['Document Number']||'').trim(),
        name:             String(r['Name']||'').slice(0,120),
        tx_type:          String(r['Type']||'').trim(),
        site:             String(r['Site']||'').slice(0,120),
        currency:         String(r['Currency']||'').trim(),
        status:           String(r['Status']||'').trim(),
        period:           String(r['Period']||'').trim(),
        status2:          String(r['Status2']||'').trim(),
        memo2:            String(r['Memo']||'').slice(0,120),
        // editable cols Q-AB
        sub_name:          String(r['Sub Name']||'').trim(),
        relationship:      String(r['Relationship']||'').trim(),
        relationship_group:String(r['Relationship Group']||'').trim(),
        pair_key:          String(r['Pair Key']||'').trim(),
        net_ic_balance:    parseFloat(r['Net I/C Balance'])||0,
        ic_name:           String(r['IC Name']||'').trim(),
        who_owes_who:      String(r['Who Owes Who']||'').trim(),
        who_owes:          String(r['Who Owes']||'').trim(),
        who_is_owed:       String(r['Who is Owed']||'').trim(),
        include_exclude:   String(r['Include/Exclude']||'Include').trim(),
        description:       String(r['Description']||'').trim(),
        column1:           String(r['Column1']||'').trim(),
      })));
      ST.uploadProgress=30+Math.round((i/raw.length)*62);
      ST.uploadMsg=`Saving rows ${i+1}–${Math.min(i+BATCH,raw.length)} of ${raw.length.toLocaleString()}…`;
      render();
    }
    ST.uploadStatus='done';ST.uploadMsg='Saved!';ST.uploadProgress=100;render();
    await loadUpload(upload);
  }catch(e){
    console.error('Upload error:', e);
    ST.uploadStatus='error';
    ST.uploadMsg='Upload failed: '+e.message;
    ST.screen='upload';
    try{ render(); } catch(_){
      document.getElementById('root').innerHTML='<div class="app"><div class="loading" style="color:#dc2626"><b>Upload failed</b><br>'+e.message+'<br><br><button class="btn" onclick="location.reload()">Reload app</button></div></div>';
    }
  }
}

async function loadUpload(upload){
  ST.current=upload;
  document.getElementById('root').innerHTML=`<div class="app"><div class="loading"><span class="spin"></span>Loading ${esc(upload.file_name)}…</div></div>`;
  ST.rows=await api.get('transactions',`upload_id=eq.${upload.id}&order=period.asc&limit=9999`);
  aggregate(ST.rows);
  ST.screen='dashboard';ST.view='hub';ST.selectedPair=null;ST.search='';ST.statusFilter='all';ST.rawPage=0;
  render();
}

async function init(){
  try{
    ST.uploads=await api.get('uploads','order=created_at.desc');
    if(ST.uploads.length===0){ST.screen='upload';ST.uploadStatus=null;render();return;}
    await loadUpload(ST.uploads[0]);
  }catch(e){
    document.getElementById('root').innerHTML=`<div class="app"><div class="loading" style="color:#dc2626">Connection error: ${e.message}</div></div>`;
  }
}

// ── INLINE EDIT ─────────────────────────────────────────────────────────────
function startEdit(id,field,e){
  if(e)e.stopPropagation();
  ST.editingCell={id,field};render();
  setTimeout(()=>{const inp=document.getElementById('ie-'+id+'-'+field);if(inp){inp.focus();if(inp.select)inp.select();}},30);
}

async function commitEdit(id,field){
  const inp=document.getElementById('ie-'+id+'-'+field);
  if(!inp)return;
  const val=inp.value;
  const row=ST.rows.find(r=>r.id===id);
  if(!row){ST.editingCell=null;render();return;}
  const fdef=EDITABLE_COLS.find(f=>f.key===field);
  const newVal=fdef?.type==='number'?parseFloat(val)||0:val;
  if(String(row[field]||'')==String(newVal)){ST.editingCell=null;render();return;}
  row[field]=newVal;row.edited_by='team';row.edited_at=new Date().toISOString();
  await api.patch('transactions',`id=eq.${id}`,{[field]:newVal,edited_by:'team',edited_at:row.edited_at});
  ST.editingCell=null;aggregate(ST.rows);render();
}

function cancelEdit(){ST.editingCell=null;render();}

function editableCell(row,field,val){
  const id=row.id;
  const isEditing=ST.editingCell&&ST.editingCell.id===id&&ST.editingCell.field===field;
  const isEdited=!!row.edited_by;
  const fdef=EDITABLE_COLS.find(f=>f.key===field);
  if(isEditing){
    if(fdef?.type==='select'){
      return`<select class="inline-edit" id="ie-${id}-${field}"
        onchange="commitEdit('${id}','${field}')"
        onblur="commitEdit('${id}','${field}')"
        onkeydown="if(event.key==='Escape')cancelEdit()">
        ${(fdef.options||[]).map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('')}
      </select>`;
    }
    return`<input class="inline-edit" id="ie-${id}-${field}" type="${fdef?.type||'text'}" value="${esc(val)}"
      onblur="commitEdit('${id}','${field}')"
      onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape')cancelEdit()">`;
  }
  const display=field==='include_exclude'
    ?`<span class="${val==='Exclude'?'excl':'incl'}">${esc(val||'Include')}</span>`
    :`<span class="editable-cell ${isEdited?'edited':''}" title="Click to edit">${esc(val)||'&nbsp;&nbsp;&nbsp;'}</span>`;
  return`<span onclick="startEdit('${id}','${field}',event)">${display}</span>`;
}

// ── EXPORT ───────────────────────────────────────────────────────────────────
function exportExcel(type){
  const wb=XLSX.utils.book_new();
  const allCols=[...READONLY_COLS,...EDITABLE_COLS];
  if(type==='raw'||type==='all'){
    const hdr=allCols.map(c=>c.label);
    const rows=ST.rows.map(r=>allCols.map(c=>r[c.key]??''));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...rows]),'RAW DATA');
  }
  if(type==='summary'||type==='all'){
    const hdr=['Pair Key','AR Total','AP Total','Variance','Status','Currencies'];
    const rows=ST.pairs.map(p=>[p.pair,p.arT,p.apT,p.diff,p.balanced?'Balanced':'Variance',p.cur.join(',')]);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...rows]),'Pair Summary');
  }
  if(type==='stmt'||type==='all'){
    const entities=[...new Set(ST.rows.map(r=>r.sub_name).filter(Boolean))].sort();
    entities.forEach(entity=>{
      const txs=ST.rows.filter(r=>r.sub_name===entity);
      const arT=txs.filter(r=>isAR(r)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
      const apT=txs.filter(r=>!isAR(r)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
      const hdr=['Pair Key','Relationship','Amount','Currency','Period','Description','Doc #','Memo','Who Owes Who'];
      const rows=txs.map(r=>[r.pair_key,r.relationship,r.amount,r.currency,r.period,r.description,r.doc_number,r.memo,r.who_owes_who]);
      const ws=XLSX.utils.aoa_to_sheet([[`Statement: ${entity}`],['AR Total',arT],['AP Total',apT],['Net',arT-apT],[],[...hdr],...rows]);
      XLSX.utils.book_append_sheet(wb,ws,entity.replace(/[\\/*?[\]]/g,'').slice(0,28));
    });
  }
  if(type==='hub'||type==='all'){
    const hub=buildHub();
    const hdr=['Direction','Entity','Net vs START','Balanced'];
    const rows=[...hub.incoming.map(e=>['Incoming',e.entity,e.netVsStart,e.pairs.every(p=>p.balanced)?'Yes':'No']),
      ...hub.outgoing.map(e=>['Outgoing',e.entity,Math.abs(e.netVsStart),e.pairs.every(p=>p.balanced)?'Yes':'No'])];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...rows]),'START Hub');
  }
  XLSX.writeFile(wb,`IntercoRecon_${new Date().toISOString().slice(0,10)}.xlsx`);
  closeDropdown();
}

function closeDropdown(){document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('open'));}
function toggleDd(id){const m=document.getElementById(id);document.querySelectorAll('.dropdown-menu').forEach(x=>{if(x.id!==id)x.classList.remove('open');});m.classList.toggle('open');}

function drillSub(entity){
  const pair=ST.pairs.find(p=>p.pair.includes(entity)&&p.pair.includes('START')&&!p.pair.includes('ELIM'));
  if(pair){ST.selectedPair=pair.pair;ST.view='summary';ST.txPeriod='';ST.txDesc='';ST.txSide='';render();
    setTimeout(()=>{const el=document.getElementById('drill');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},80);}
}

function renderSummary(f){
  const detail=ST.selectedPair?ST.pairs.find(p=>p.pair===ST.selectedPair):null;

    if(ST.txPeriod&&t.per!==ST.txPeriod)return false;
    if(ST.txDesc&&t.desc!==ST.txDesc)return false;

function renderStatements(){
  const entities=[...new Set(ST.rows.map(r=>r.sub_name).filter(Boolean))].sort();
  const stmtRows=ST.stmtEntity?ST.rows.filter(r=>r.sub_name===ST.stmtEntity):[];

  // Totals for header
  const arT=stmtRows.filter(r=>isAR(r)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const apT=stmtRows.filter(r=>!isAR(r)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);

  // Group by pair key, then within each pair roll up by period + description
  const byPair={};
  stmtRows.forEach(r=>{
    const pk=r.pair_key||'Other';
    if(!byPair[pk])byPair[pk]={pair:pk,txs:[],arT:0,apT:0};
    const a=parseFloat(r.amount)||0;
    if(isAR(r))byPair[pk].arT+=a; else byPair[pk].apT+=a;
    byPair[pk].txs.push(r);
  });

  // Roll up txs within a pair by period + description + side (AR/AP)
  function rollup(txs){
    const map={};
    txs.forEach(r=>{
      const side=isAR(r)?'AR':'AP';
      const key=`${r.period||''}||${r.description||''}||${side}`;
      if(!map[key]){
        map[key]={
          period:r.period||'',
          description:r.description||'',
          side,
          isAR:isAR(r),
          currency:r.currency||'',
          amount:0,
          count:0,
          who_owes_who:r.who_owes_who||'',
          relationship:r.relationship||'',
        };
      }
      map[key].amount+=(parseFloat(r.amount)||0);
      map[key].count+=1;
      // keep currency if consistent
      if(map[key].currency!==r.currency) map[key].currency='Mixed';
    });
    // Sort by period then description
    return Object.values(map).sort((a,b)=>{
      const ps=sortP(a.period||'',b.period||'');
      if(ps!==0)return ps;
      return(a.description||'').localeCompare(b.description||'');
    });
  }

  return`<div class="filters">
    <select onchange="ST.stmtEntity=this.value;render()" style="width:200px">
      <option value="">Select entity…</option>
      ${entities.map(e=>`<option value="${esc(e)}" ${ST.stmtEntity===e?'selected':''}>${esc(e)}</option>`).join('')}
    </select>
    ${ST.stmtEntity?`
      <button class="btn-blue" onclick="exportPDF('stmt')">⬇ PDF</button>
      <button class="btn-green" onclick="exportExcel('stmt')">⬇ Excel</button>`:''}
  </div>

  ${!ST.stmtEntity?'<div class="card"><div class="empty">Select an entity to view its statement</div></div>':''}

  ${ST.stmtEntity?`
  <div class="card">
    <div class="stmt-entity-head">
      <span>${esc(ST.stmtEntity)} — Intercompany Statement</span>
      <div style="display:flex;gap:20px;font-size:12px;flex-wrap:wrap">
        <span>AR Total: <strong class="ok">${fmt(arT)}</strong></span>
        <span>AP Total: <strong class="info">${fmt(apT)}</strong></span>
        <span>Net: <strong class="${arT-apT>=0?'ok':'warn'}">${fmtD(arT-apT)}</strong></span>
        <span class="muted">${stmtRows.length} transactions across ${Object.keys(byPair).length} pairs</span>
      </div>
    </div>

    ${Object.values(byPair).map(group=>{
      const rolled=rollup(group.txs);
      const periods=[...new Set(rolled.map(r=>r.period))].sort(sortP);

      // Period subtotals
      const periodTotals={};
      rolled.forEach(r=>{
        if(!periodTotals[r.period])periodTotals[r.period]={ar:0,ap:0};
        if(r.isAR)periodTotals[r.period].ar+=r.amount;
        else      periodTotals[r.period].ap+=r.amount;
      });

      return`
      <div class="stmt-section-head" style="display:flex;justify-content:space-between;align-items:center">
        <span>${esc(group.pair)}</span>
        <span style="font-size:11px;font-weight:400">
          AR: <span class="ok">${fmt(group.arT)}</span> &nbsp;
          AP: <span class="info">${fmt(group.apT)}</span> &nbsp;
          Net: <span class="${Math.abs(group.arT-group.apT)<0.02?'ok':group.arT-group.apT>0?'ok':'warn'}">${fmtD(group.arT-group.apT)}</span>
        </span>
      </div>

      <div class="scroll-x">
      <table>
        <thead>
          <tr>
            <th style="min-width:80px">Period</th>
            <th style="min-width:180px">Description</th>
            <th style="min-width:70px">Side</th>
            <th style="min-width:80px">Relationship</th>
            <th class="num" style="min-width:110px">Amount</th>
            <th style="min-width:50px">Curr</th>
            <th class="num" style="min-width:50px;color:#888;font-weight:400">Lines</th>
            <th style="min-width:140px">Who Owes Who</th>
          </tr>
        </thead>
        <tbody>
          ${periods.map(per=>{
            const perRows=rolled.filter(r=>r.period===per);
            const pt=periodTotals[per];
            const perNet=pt.ar-pt.ap;
            return`
            ${perRows.map((r,ri)=>`
            <tr style="background:${r.isAR?'#f0fdf4':'#eff6ff'}">
              ${ri===0?`<td rowspan="${perRows.length}" style="font-weight:500;vertical-align:top;padding-top:9px;border-right:0.5px solid #e5e5e5;background:#fff">${esc(r.period)}</td>`:''}
              <td>${esc(r.description)}</td>
              <td>${r.isAR
                ?'<span style="background:#dcfce7;color:#16a34a;font-size:10px;padding:2px 6px;border-radius:100px;font-weight:500">AR</span>'
                :'<span style="background:#dbeafe;color:#2563eb;font-size:10px;padding:2px 6px;border-radius:100px;font-weight:500">AP</span>'}
              </td>
              <td style="font-size:11px;color:#666">${esc(r.relationship)}</td>
              <td class="num" style="font-weight:500">${fmt(r.amount)}</td>
              <td style="font-size:11px">${esc(r.currency)}</td>
              <td class="num muted" style="font-size:11px">${r.count}</td>
              <td style="font-size:11px;color:#666">${esc(r.who_owes_who)}</td>
            </tr>`).join('')}
            <tr style="background:#f9fafb;border-top:0.5px solid #d4d4d4">
              <td style="font-size:11px;font-weight:500;color:#666;padding-left:18px" colspan="3">
                ${esc(per)} subtotal
              </td>
              <td></td>
              <td class="num ok" style="font-size:11px;font-weight:500">${fmt(pt.ar)}</td>
              <td class="num info" style="font-size:11px;font-weight:500">${fmt(pt.ap)}</td>
              <td></td>
              <td class="num" style="font-size:11px;font-weight:600;color:${Math.abs(perNet)<0.02?'#16a34a':perNet>0?'#16a34a':'#dc2626'}">Net: ${fmtD(perNet)}</td>
            </tr>`;
          }).join('')}

          <tr style="background:#f0fdf4;border-top:1.5px solid #86efac">
            <td style="font-weight:600;font-size:12px" colspan="3">Pair total — ${esc(group.pair)}</td>
            <td></td>
            <td class="num ok" style="font-weight:600;font-size:12px">${fmt(group.arT)}</td>
            <td class="num info" style="font-weight:600;font-size:12px">${fmt(group.apT)}</td>
            <td></td>
            <td class="num" style="font-weight:700;font-size:12px;color:${Math.abs(group.arT-group.apT)<0.02?'#16a34a':group.arT-group.apT>0?'#16a34a':'#dc2626'}">Net: ${fmtD(group.arT-group.apT)}</td>
          </tr>
        </tbody>
      </table>
      </div>`;
    }).join('')}

    <div style="background:#f0fdf4;border-top:2px solid #16a34a;padding:12px 16px;display:flex;gap:24px;align-items:center;flex-wrap:wrap">
      <span style="font-size:13px;font-weight:600">${esc(ST.stmtEntity)} — Grand Total</span>
      <span style="font-size:13px">AR: <strong class="ok">${fmt(arT)}</strong></span>
      <span style="font-size:13px">AP: <strong class="info">${fmt(apT)}</strong></span>
      <span style="font-size:13px">Net: <strong class="${arT-apT>=0?'ok':'warn'}" style="font-size:14px">${fmtD(arT-apT)}</strong></span>
    </div>
  </div>`:''}`;
}

function renderRaw(){
  // build per-column unique values for filter dropdowns
  function colVals(key){
    return [...new Set(ST.rows.map(r=>String(r[key]??'')).filter(Boolean))].sort();
  }

  // apply all filters
  let rows=ST.rows;
  if(ST.rawPair)   rows=rows.filter(r=>r.pair_key===ST.rawPair);
  if(ST.rawPeriod) rows=rows.filter(r=>r.period===ST.rawPeriod);
  if(ST.rawInclude)rows=rows.filter(r=>(r.include_exclude||'Include')===ST.rawInclude);
  if(ST.rawSearch) rows=rows.filter(r=>Object.values(r).join(' ').toLowerCase().includes(ST.rawSearch.toLowerCase()));
  // per-column filters
  const cf=ST.rawColFilters||{};
  Object.entries(cf).forEach(([k,v])=>{if(v)rows=rows.filter(r=>String(r[k]??'')==v);});

  const total=rows.length,pages=Math.ceil(total/PAGE_SIZE)||1;
  const page=Math.min(ST.rawPage,pages-1);
  const pageRows=rows.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  const allCols=[...READONLY_COLS,...EDITABLE_COLS];
  const pairs=[...new Set(ST.rows.map(r=>r.pair_key).filter(Boolean))].sort();

  // column filter header row — one mini-select per column
  function colFilterTh(col){
    const vals=colVals(col.key);
    const cur=cf[col.key]||'';
    if(vals.length===0) return`<th style="padding:3px 4px;background:#fafafa"></th>`;
    const isEdit=EDITABLE_COLS.includes(col);
    const bg=isEdit?'#f0fdf4':'#f5f5f3';
    return`<th style="padding:3px 4px;background:${bg}">
      <select style="font-size:10px;padding:2px 3px;border-radius:4px;border:0.5px solid #d4d4d4;background:#fff;color:#111;width:100%;max-width:120px"
        onchange="ST.rawColFilters=ST.rawColFilters||{};ST.rawColFilters['${col.key}']=this.value;ST.rawPage=0;render()">
        <option value="">All</option>
        ${vals.map(v=>`<option value="${esc(v)}" ${cur===v?'selected':''}>${esc(String(v).slice(0,28))}</option>`).join('')}
      </select>
    </th>`;
  }

  const activeFilters=Object.values(cf).filter(Boolean).length;

  return`<div class="filters">
    <input type="search" placeholder="Search all fields…" value="${esc(ST.rawSearch)}" oninput="ST.rawSearch=this.value;ST.rawPage=0;render()" style="width:190px">
    <select onchange="ST.rawPair=this.value;ST.rawPage=0;render()">
      <option value="">All pairs</option>
      ${pairs.map(p=>`<option value="${esc(p)}" ${ST.rawPair===p?'selected':''}>${esc(p)}</option>`).join('')}
    </select>
    <select onchange="ST.rawPeriod=this.value;ST.rawPage=0;render()">
      <option value="">All periods</option>
      ${ST.periods.map(p=>`<option value="${p}" ${ST.rawPeriod===p?'selected':''}>${p}</option>`).join('')}
    </select>
    <select onchange="ST.rawInclude=this.value;ST.rawPage=0;render()">
      <option value="">All rows</option>
      <option value="Include" ${ST.rawInclude==='Include'?'selected':''}>Include only</option>
      <option value="Exclude" ${ST.rawInclude==='Exclude'?'selected':''}>Exclude only</option>
    </select>
    ${activeFilters>0?`<button class="btn" style="color:#dc2626;border-color:#fca5a5" onclick="ST.rawColFilters={};ST.rawSearch='';ST.rawPair='';ST.rawPeriod='';ST.rawInclude='';ST.rawPage=0;render()">✕ Clear all filters (${activeFilters+[ST.rawSearch,ST.rawPair,ST.rawPeriod,ST.rawInclude].filter(Boolean).length})</button>`:''}
    <span class="muted" style="font-size:12px;margin-left:auto">${total.toLocaleString()} rows</span>
  </div>
  <div class="card">
    <div class="card-head">
      <div>
        <span class="card-title">Raw Data — columns A–AB</span>
        <span style="font-size:11px;color:#888;margin-left:10px">
          <span style="background:#f0fdf4;color:#16a34a;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500">green</span> = editable (Q–AB) &nbsp;
          <span style="background:#fef9c3;border:1px dashed #ca8a04;padding:1px 5px;border-radius:3px;font-size:10px">yellow</span> = edited
        </span>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="muted" style="font-size:11px">Page ${page+1} of ${pages}</span>
        <button class="btn" onclick="ST.rawPage=Math.max(0,ST.rawPage-1);render()" ${page===0?'disabled':''}>← Prev</button>
        <button class="btn" onclick="ST.rawPage=Math.min(${pages-1},ST.rawPage+1);render()" ${page>=pages-1?'disabled':''}>Next →</button>
      </div>
    </div>
    <div class="scroll-x scroll-y"><table>
      <thead>
        <tr>
          ${READONLY_COLS.map(c=>`<th style="background:#f5f5f3;color:#888">${c.label}</th>`).join('')}
          ${EDITABLE_COLS.map(c=>`<th style="background:#f0fdf4;color:#166534;border-left:${c===EDITABLE_COLS[0]?'2px solid #86efac':'none'}">${c.label}</th>`).join('')}
        </tr>
        <tr>
          ${READONLY_COLS.map(c=>colFilterTh(c)).join('')}
          ${EDITABLE_COLS.map(c=>colFilterTh(c)).join('')}
        </tr>
      </thead>
      <tbody>${pageRows.map(r=>`<tr>
        ${READONLY_COLS.map(c=>`<td class="muted" style="font-size:11px;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis">${esc(r[c.key])}</td>`).join('')}
        ${EDITABLE_COLS.map(c=>`<td style="min-width:80px;border-left:${c===EDITABLE_COLS[0]?'2px solid #86efac':'none'}">${editableCell(r,c.key,r[c.key])}</td>`).join('')}
      </tr>`).join('')}
      ${pageRows.length===0?`<tr><td colspan="${READONLY_COLS.length+EDITABLE_COLS.length}" class="empty">No rows match filters</td></tr>`:''}</tbody>
    </table></div>
  </div>
  <p style="font-size:11px;color:#888">Use column dropdowns to filter. Click any green-header cell to edit — saves to Supabase on Enter or click away.</p>`;
}

function selectPair(pair){
  ST.selectedPair=ST.selectedPair===pair?null:pair;
  ST.txPeriod='';ST.txDesc='';ST.txSide='';
  render();
  setTimeout(()=>{const el=document.getElementById('drill');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},60);
}

function renderModal(){return'';}

init();
</script>
</body>
</html>
