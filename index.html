<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interco Recon — Evolve2Impact</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;color:#111;min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:1.5rem 1rem}
button,select,input,textarea{font-family:inherit}
.btn{font-size:12px;padding:5px 11px;border-radius:7px;border:0.5px solid #d4d4d4;background:#fff;color:#111;cursor:pointer}
.btn:hover{background:#f5f5f3}
.btn-dark{font-size:12px;padding:6px 14px;border-radius:7px;border:none;background:#111;color:#fff;cursor:pointer;font-weight:500}
.btn-green{font-size:12px;padding:5px 11px;border-radius:7px;border:none;background:#16a34a;color:#fff;cursor:pointer}
.btn-blue{font-size:12px;padding:5px 11px;border-radius:7px;border:none;background:#2563eb;color:#fff;cursor:pointer}
.btn-sm{font-size:11px;padding:3px 7px;border-radius:5px;border:0.5px solid #d4d4d4;background:#fff;color:#111;cursor:pointer}
.card{background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;overflow:hidden;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-head{padding:10px 16px;border-bottom:0.5px solid #e5e5e5;background:#fafafa;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:500}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1rem}
.metric{background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:10px 12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.metric-label{font-size:11px;color:#666;margin-bottom:3px}
.metric-val{font-size:18px;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 8px;font-size:11px;font-weight:500;color:#666;border-bottom:0.5px solid #e5e5e5;white-space:nowrap;background:#fafafa;position:sticky;top:0;z-index:1}
td{padding:6px 8px;border-bottom:0.5px solid #f0f0f0;vertical-align:middle}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:#fafafa}
tr.selected td{background:#f5f5f3!important}
.num{text-align:right;font-variant-numeric:tabular-nums}
.ok{color:#16a34a}.warn{color:#dc2626}.info{color:#2563eb}.amber{color:#d97706}.muted{color:#888}
.scroll-x{overflow-x:auto}
.scroll-y{overflow-y:auto;max-height:420px}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{font-size:12px;padding:5px 12px;border-radius:8px;border:0.5px solid #d4d4d4;background:#fff;color:#555;cursor:pointer;transition:all .12s;white-space:nowrap}
.tab:hover{background:#f5f5f3;color:#111}
.tab.active{background:#111;color:#fff;border-color:#111;font-weight:500}
select,input[type=text],input[type=search],input[type=number]{font-size:12px;padding:5px 8px;border-radius:7px;border:0.5px solid #d4d4d4;background:#fff;color:#111}
textarea{font-size:12px;padding:7px 9px;border-radius:7px;border:0.5px solid #d4d4d4;background:#fff;color:#111;resize:vertical;min-height:56px;width:100%}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.pill{font-size:11px;padding:2px 7px;border-radius:100px;border:0.5px solid #e5e5e5;color:#666;background:#fafafa;white-space:nowrap;display:inline-block}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #e5e5e5;border-top-color:#111;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{padding:3rem;text-align:center;color:#666;font-size:13px}
.empty{padding:1.5rem;text-align:center;color:#999;font-size:12px}
.drop-zone{border:2px dashed #d4d4d4;border-radius:12px;padding:2.5rem 2rem;text-align:center;cursor:pointer;transition:all .15s;background:#fff}
.drop-zone:hover,.drop-zone.drag{border-color:#111;background:#f5f5f3}
.upload-wrap{max-width:520px;margin:3.5rem auto;padding:0 1rem}
.progress-bar{height:4px;background:#e5e5e5;border-radius:4px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:#111;border-radius:4px;transition:width .25s}
.hub-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
@media(max-width:640px){.hub-row{grid-template-columns:1fr}}
.tag-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:100px;font-weight:500;border:0.5px solid transparent;cursor:pointer;white-space:nowrap}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;overflow-y:auto}
.modal{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:520px;box-shadow:0 8px 40px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:500;margin-bottom:14px}
.form-row{margin-bottom:12px}
.form-label{font-size:11px;color:#666;margin-bottom:4px;display:block}
.editable-cell{cursor:pointer;border-bottom:1px dashed #ccc;padding:2px 4px;border-radius:3px;display:inline-block;min-width:40px}
.editable-cell:hover{background:#f0f9ff;border-color:#2563eb}
.editable-cell.edited{background:#fef9c3;border-color:#ca8a04}
.inline-edit{font-size:12px;padding:2px 5px;border-radius:4px;border:1px solid #2563eb;background:#fff;color:#111;width:100%;min-width:80px}
.stmt-entity-head{background:#f0fdf4;border-left:3px solid #16a34a;padding:10px 14px;font-weight:500;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.stmt-section-head{background:#fafafa;padding:7px 14px;font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid #e5e5e5}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPA_URL='https://zwinmrqclkefpsfedwgg.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3aW5tcnFjbGtlZnBzZmVkd2dnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjY5MzUsImV4cCI6MjA5NjEwMjkzNX0.1uQY3ypn9223gDAWodnqmW82gfNBFo-whBhl4GMU5Dw';
const H={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
const api={
  get:async(t,p='')=>{const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json()},
  post:async(t,b)=>{const r=await fetch(`${SUPA_URL}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json()},
  patch:async(t,p,b)=>{const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json()},
  del:async(t,p)=>{const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text())}
};
const fmt=v=>'$'+Math.abs(Number(v)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=v=>{if(Math.abs(v)<0.02)return'<span class="ok">—</span>';return`<span class="warn">${v>0?'+':'-'}${fmt(v)}</span>`;};
const isAR=r=>r.relationship&&(r.relationship.includes('A/R')||r.relationship.toLowerCase().includes('due from'));
const PORD=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const sortP=(a,b)=>{const[am,ay]=a.split(' '),[bm,by]=b.split(' ');return ay!==by?Number(ay)-Number(by):PORD.indexOf(am)-PORD.indexOf(bm);};
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const TAG_DEFS=[
  {tag:'Reviewed — no issues',bg:'#dcfce7',color:'#16a34a'},
  {tag:'Cleared for payment',bg:'#dbeafe',color:'#2563eb'},
  {tag:'Needs investigation',bg:'#fef3c7',color:'#d97706'},
  {tag:'On hold',bg:'#ede9fe',color:'#7c3aed'},
];
function tagStyle(tag){const d=TAG_DEFS.find(t=>t.tag===tag);return d?`background:${d.bg};color:${d.color};border-color:${d.color}30`:'background:#f3f4f6;color:#374151;border-color:#d1d5db';}

const EDITABLE_FIELDS=[
  {key:'sub_name',label:'Sub Name',type:'text'},
  {key:'relationship',label:'Relationship',type:'text'},
  {key:'pair_key',label:'Pair Key',type:'text'},
  {key:'amount',label:'Amount (FC)',type:'number'},
  {key:'currency',label:'Currency',type:'text'},
  {key:'period',label:'Period',type:'text'},
  {key:'description',label:'Description',type:'text'},
  {key:'who_owes_who',label:'Who Owes Who',type:'text'},
  {key:'doc_number',label:'Doc #',type:'text'},
  {key:'memo',label:'Memo',type:'text'},
  {key:'site',label:'Site',type:'text'},
  {key:'status',label:'Status',type:'text'},
  {key:'name',label:'Name',type:'text'},
  {key:'ic_name',label:'IC Name',type:'text'},
];
const READONLY_FIELDS=[
  {key:'subsidiary',label:'Subsidiary'},
  {key:'internal_id',label:'Internal ID'},
  {key:'relationship_group',label:'Rel Group'},
  {key:'net_ic_balance',label:'Net I/C Bal'},
  {key:'tx_date',label:'Date'},
  {key:'memo2',label:'Memo 2'},
  {key:'amount_functional',label:'Amt (Func)'},
  {key:'currency_type',label:'Currency Type'},
  {key:'tx_type',label:'Type'},
  {key:'status2',label:'Status 2'},
];

// ── STATE ──────────────────────────────────────────────────────────────────
const ST={
  screen:'loading',uploads:[],current:null,rows:[],pairs:[],periods:[],
  pairTags:{},txTags:{},tagsConfig:[],
  view:'hub',statusFilter:'all',search:'',
  selectedPair:null,txPeriod:'',txDesc:'',txSide:'',txTagFilter:'',
  stmtEntity:null,
  rawSearch:'',rawPair:'',rawPeriod:'',rawPage:0,
  editingCell:null, // {id, field}
  modal:null,
  uploadStatus:null,uploadMsg:'',uploadProgress:0,
};
const PAGE_SIZE=100;

function aggregate(rows){
  const map={};
  rows.forEach(r=>{
    const pair=r.pair_key||'';if(!pair)return;
    if(!map[pair])map[pair]={pair,arByP:{},apByP:{},cur:new Set(),desc:new Set(),per:new Set(),txs:[],who:new Set()};
    const p=map[pair],amt=parseFloat(r.amount)||0;
    p.cur.add(r.currency||'');p.desc.add(r.description||'');p.per.add(r.period||'');
    if(r.who_owes_who)p.who.add(r.who_owes_who);
    if(isAR(r))p.arByP[r.period]=(p.arByP[r.period]||0)+amt;
    else       p.apByP[r.period]=(p.apByP[r.period]||0)+amt;
    p.txs.push({id:r.id,sub:r.sub_name,rel:r.relationship,amt,desc:r.description,per:r.period,
      cur:r.currency,who:r.who_owes_who,doc:r.doc_number,memo:(r.memo||'').slice(0,80),
      isAR:isAR(r),tag:r.tag,tag_note:r.tag_note,tagged_by:r.tagged_by,
      edited:r.edited_by?true:false});
  });
  ST.pairs=Object.values(map).map(p=>{
    const arT=Object.values(p.arByP).reduce((s,v)=>s+v,0);
    const apT=Object.values(p.apByP).reduce((s,v)=>s+v,0);
    const diff=arT-apT;
    return{pair:p.pair,arT,apT,diff,balanced:Math.abs(diff)<0.02,
      cur:[...p.cur].filter(Boolean).sort(),desc:[...p.desc].filter(Boolean).sort(),
      per:[...p.per].filter(Boolean).sort(sortP),txs:p.txs,
      who:[...new Set([...p.who])],arByP:p.arByP,apByP:p.apByP};
  }).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  ST.periods=[...new Set(rows.map(r=>r.period||'').filter(Boolean))].sort(sortP);
}

function buildHub(){
  const startPairs=ST.pairs.filter(p=>p.pair.includes('START')&&!p.pair.includes('ELIM'));
  const subs={};
  startPairs.forEach(p=>{
    const parts=p.pair.split('|').map(s=>s.trim());
    const other=parts[0]==='START'?parts[1]:parts[0];
    if(!other||other==='START')return;
    if(!subs[other])subs[other]={entity:other,netVsStart:0,pairs:[]};
    const isStartRight=parts[1]==='START';
    subs[other].netVsStart+=isStartRight?p.arT-p.apT:p.apT-p.arT;
    subs[other].pairs.push({pair:p.pair,diff:p.diff,balanced:p.balanced});
  });
  const incoming=Object.values(subs).filter(s=>s.netVsStart>0.02).sort((a,b)=>b.netVsStart-a.netVsStart);
  const outgoing=Object.values(subs).filter(s=>s.netVsStart<-0.02).sort((a,b)=>a.netVsStart-b.netVsStart);
  return{incoming,outgoing,totalIn:incoming.reduce((s,e)=>s+e.netVsStart,0),totalOut:outgoing.reduce((s,e)=>s+Math.abs(e.netVsStart),0),net:incoming.reduce((s,e)=>s+e.netVsStart,0)-outgoing.reduce((s,e)=>s+Math.abs(e.netVsStart),0)};
}

function filtered(){return ST.pairs.filter(p=>{
  if(ST.statusFilter==='unbalanced'&&p.balanced)return false;
  if(ST.statusFilter==='balanced'&&!p.balanced)return false;
  if(ST.search&&!p.pair.toLowerCase().includes(ST.search.toLowerCase()))return false;
  return true;
});}

function payments(){return ST.pairs.filter(p=>!p.balanced).map(p=>{
  const[e1,e2]=(p.pair+'|').split('|').map(s=>s.trim());
  const[payer,payee]=p.diff>0?[e2,e1]:[e1,e2];
  return{pair:p.pair,payer,payee,amt:Math.abs(p.diff),cur:p.cur,per:p.per};
});}

// ── UPLOAD ─────────────────────────────────────────────────────────────────
async function processFile(file){
  ST.uploadStatus='parsing';ST.uploadMsg='Reading file…';ST.uploadProgress=15;render();
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    const sn=wb.SheetNames.find(n=>n.toLowerCase().includes('interco')&&n.toLowerCase().includes('result'))||wb.SheetNames[0];
    const raw=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''});
    ST.uploadStatus='saving';ST.uploadMsg=`Saving ${raw.length.toLocaleString()} rows…`;ST.uploadProgress=30;render();
    const periods=[...new Set(raw.map(r=>String(r['Period']||'')).filter(Boolean))];
    const[upload]=await api.post('uploads',{file_name:file.name,row_count:raw.length,periods});
    const BATCH=300;
    for(let i=0;i<raw.length;i+=BATCH){
      await api.post('transactions',raw.slice(i,i+BATCH).map(r=>({
        upload_id:upload.id,
        pair_key:String(r['Pair Key']||'').trim(),
        sub_name:String(r['Sub Name']||'').trim(),
        relationship:String(r['Relationship']||'').trim(),
        amount:parseFloat(r['Amount (Foreign Currency)'])||0,
        amount_functional:parseFloat(r['Amount'])||0,
        currency:String(r['Currency']||'').trim(),
        currency_type:String(r['Currency Type']||'').trim(),
        period:String(r['Period']||'').trim(),
        description:String(r['Description']||'').trim(),
        who_owes_who:String(r['Who Owes Who']||'').trim(),
        doc_number:String(r['Document Number']||'').trim(),
        memo:String(r['Memo (Main)']||'').slice(0,120),
        memo2:String(r['Memo (Main)2']||'').slice(0,120),
        subsidiary:String(r['Subsidiary']||'').slice(0,200),
        internal_id:String(r['Internal ID']||''),
        relationship_group:String(r['Relationship Group']||''),
        net_ic_balance:parseFloat(r['Net I/C Balance'])||0,
        tx_date:String(r['Date']||'').slice(0,20),
        name:String(r['Name']||'').slice(0,120),
        ic_name:String(r['IC Name']||'').trim(),
        tx_type:String(r['Type']||'').trim(),
        site:String(r['Site']||'').slice(0,120),
        status:String(r['Status']||'').trim(),
        status2:String(r['Status2']||'').trim(),
      })));
      ST.uploadProgress=30+Math.round((i/raw.length)*62);
      ST.uploadMsg=`Saving rows ${i+1}–${Math.min(i+BATCH,raw.length)} of ${raw.length.toLocaleString()}…`;
      render();
    }
    ST.uploadStatus='done';ST.uploadMsg='Saved!';ST.uploadProgress=100;render();
    await loadUpload(upload);
  }catch(e){ST.uploadStatus='error';ST.uploadMsg='Error: '+e.message;render();}
}

async function loadUpload(upload){
  ST.current=upload;
  document.getElementById('root').innerHTML=`<div class="app"><div class="loading"><span class="spin"></span>Loading ${esc(upload.file_name)}…</div></div>`;
  const[rows,pairTagRows,tagsConfig]=await Promise.all([
    api.get('transactions',`upload_id=eq.${upload.id}&order=period.asc&limit=9999`),
    api.get('pair_tags',`upload_id=eq.${upload.id}`),
    api.get('tags_config','order=sort_order.asc'),
  ]);
  ST.rows=rows;ST.tagsConfig=tagsConfig;
  ST.pairTags={};pairTagRows.forEach(t=>ST.pairTags[t.pair_key]=t);
  ST.txTags={};rows.forEach(r=>{if(r.tag)ST.txTags[r.id]={tag:r.tag,note:r.tag_note,by:r.tagged_by};});
  aggregate(rows);
  ST.screen='dashboard';ST.view='hub';ST.selectedPair=null;ST.search='';ST.statusFilter='all';ST.rawPage=0;
  render();
}

async function init(){
  try{
    ST.uploads=await api.get('uploads','order=created_at.desc');
    if(ST.uploads.length===0){ST.screen='upload';ST.uploadStatus=null;render();return;}
    await loadUpload(ST.uploads[0]);
  }catch(e){
    document.getElementById('root').innerHTML=`<div class="app"><div class="loading" style="color:#dc2626">Connection error: ${e.message}</div></div>`;
  }
}

// ── INLINE EDIT ─────────────────────────────────────────────────────────────
function startEdit(id,field,e){
  e.stopPropagation();
  ST.editingCell={id,field};
  render();
  setTimeout(()=>{const inp=document.getElementById('ie-'+id+'-'+field);if(inp){inp.focus();inp.select();}},30);
}

async function commitEdit(id,field){
  const inp=document.getElementById('ie-'+id+'-'+field);
  if(!inp)return;
  const val=inp.value;
  const row=ST.rows.find(r=>r.id===id);
  if(!row||String(row[field]||'')==val){ST.editingCell=null;render();return;}
  row[field]=field==='amount'?parseFloat(val)||0:val;
  row.edited_by=row.edited_by||'team';
  row.edited_at=new Date().toISOString();
  await api.patch('transactions',`id=eq.${id}`,{[field]:row[field],edited_by:'team',edited_at:row.edited_at});
  ST.editingCell=null;
  aggregate(ST.rows);
  render();
}

function cancelEdit(){ST.editingCell=null;render();}

function editableCell(row,field,val){
  const id=row.id;
  const isEditing=ST.editingCell&&ST.editingCell.id===id&&ST.editingCell.field===field;
  const isEdited=row.edited_by&&row[field]!==undefined;
  if(isEditing){
    const fdef=EDITABLE_FIELDS.find(f=>f.key===field);
    return`<input class="inline-edit" id="ie-${id}-${field}" type="${fdef?.type||'text'}" value="${esc(val)}"
      onblur="commitEdit('${id}','${field}')"
      onkeydown="if(event.key==='Enter')commitEdit('${id}','${field}');if(event.key==='Escape')cancelEdit()">`;
  }
  return`<span class="editable-cell ${isEdited?'edited':''}" onclick="startEdit('${id}','${field}',event)" title="Click to edit">${esc(val)||'&nbsp;'}</span>`;
}

// ── TAGGING ─────────────────────────────────────────────────────────────────
async function saveTag(){
  const m=ST.modal;
  const tagger=document.getElementById('tagger-name')?.value||'';
  const tag=document.getElementById('tag-select')?.value||'';
  const note=document.getElementById('tag-note')?.value||'';
  if(!tag)return;
  if(m.type==='pair'){
    const ex=ST.pairTags[m.target];
    if(ex){await api.patch('pair_tags',`id=eq.${ex.id}`,{tag,tag_note:note,tagged_by:tagger,updated_at:new Date().toISOString()});ST.pairTags[m.target]={...ex,tag,tag_note:note,tagged_by:tagger};}
    else{const[row]=await api.post('pair_tags',{upload_id:ST.current.id,pair_key:m.target,tag,tag_note:note,tagged_by:tagger});ST.pairTags[m.target]=row;}
  }else{
    await api.patch('transactions',`id=eq.${m.target}`,{tag,tag_note:note,tagged_by:tagger,tagged_at:new Date().toISOString()});
    ST.txTags[m.target]={tag,note,by:tagger};
    const tx=ST.pairs.flatMap(p=>p.txs).find(t=>t.id===m.target);
    if(tx){tx.tag=tag;tx.tag_note=note;tx.tagged_by=tagger;}
  }
  ST.modal=null;render();
}
async function clearTag(){
  const m=ST.modal;
  if(m.type==='pair'&&ST.pairTags[m.target]){await api.patch('pair_tags',`id=eq.${ST.pairTags[m.target].id}`,{tag:null,tag_note:null});delete ST.pairTags[m.target];}
  else if(m.type==='tx'){await api.patch('transactions',`id=eq.${m.target}`,{tag:null,tag_note:null,tagged_by:null});delete ST.txTags[m.target];const tx=ST.pairs.flatMap(p=>p.txs).find(t=>t.id===m.target);if(tx){tx.tag=null;tx.tag_note=null;}}
  ST.modal=null;render();
}
async function addCustomTag(){
  const val=document.getElementById('custom-tag-input')?.value?.trim();if(!val)return;
  await api.post('tags_config',{tag:val,color:'#374151',sort_order:99});
  ST.tagsConfig=await api.get('tags_config','order=sort_order.asc');
  document.getElementById('custom-tag-input').value='';
  document.getElementById('tag-select').innerHTML=tagOptions();
}
function tagOptions(sel=''){
  const base=TAG_DEFS.map(t=>`<option value="${esc(t.tag)}" ${sel===t.tag?'selected':''}>${esc(t.tag)}</option>`).join('');
  const custom=ST.tagsConfig.filter(t=>!TAG_DEFS.find(d=>d.tag===t.tag)).map(t=>`<option value="${esc(t.tag)}" ${sel===t.tag?'selected':''}>${esc(t.tag)}</option>`).join('');
  return`<option value="">Select a tag…</option>${base}${custom?'<option disabled>──────</option>'+custom:''}`;
}
function pairTagBadge(pk){const pt=ST.pairTags[pk];if(!pt||!pt.tag)return`<button class="btn-sm" onclick="ST.modal={type:'pair',target:'${esc(pk)}',existing:null};render();event.stopPropagation()">+ Tag</button>`;
  return`<span class="tag-badge" style="${tagStyle(pt.tag)}" onclick="ST.modal={type:'pair',target:'${esc(pk)}',existing:ST.pairTags['${esc(pk)}']};render();event.stopPropagation()" title="${pt.tagged_by||''}">${esc(pt.tag)}</span>`;}
function txTagBadge(tx){if(!tx.tag)return`<button class="btn-sm" onclick="ST.modal={type:'tx',target:'${tx.id}',existing:null};render();event.stopPropagation()">+ Tag</button>`;

// ── EXPORT ──────────────────────────────────────────────────────────────────
function exportExcel(type){
  const wb=XLSX.utils.book_new();
  if(type==='raw'||type==='all'){
    const headers=['Pair Key','Sub Name','Relationship','Amount','Currency','Period','Description','Who Owes Who','Doc #','Memo','Site','Status','Tag','Tag Note','Edited By','Subsidiary','Internal ID','Date','Type'];
    const rows=ST.rows.map(r=>[r.pair_key,r.sub_name,r.relationship,r.amount,r.currency,r.period,r.description,r.who_owes_who,r.doc_number,r.memo,r.site,r.status,r.tag||'',r.tag_note||'',r.edited_by||'',r.subsidiary,r.internal_id,r.tx_date,r.tx_type]);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([headers,...rows]),'Transactions');
  }
  if(type==='summary'||type==='all'){
    const hdr=['Pair Key','AR Total','AP Total','Variance','Status','Currencies','Tag'];
    const rows=ST.pairs.map(p=>[p.pair,p.arT,p.apT,p.diff,p.balanced?'Balanced':'Variance',p.cur.join(','),(ST.pairTags[p.pair]?.tag)||'']);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...rows]),'Pair Summary');
  }
  if(type==='stmt'||type==='all'){
    const entities=[...new Set(ST.rows.map(r=>r.sub_name).filter(Boolean))].sort();
    entities.forEach(entity=>{
      const txs=ST.rows.filter(r=>r.sub_name===entity);
      const hdr=['Pair Key','Relationship','Amount','Currency','Period','Description','Doc #','Memo'];
      const rows=txs.map(r=>[r.pair_key,r.relationship,r.amount,r.currency,r.period,r.description,r.doc_number,r.memo]);
      const arT=txs.filter(r=>isAR(r)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
      const apT=txs.filter(r=>!isAR(r)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
      const sheet=XLSX.utils.aoa_to_sheet([[`Statement: ${entity}`],['AR Total',arT],['AP Total',apT],['Net',arT-apT],[],[...hdr],...rows]);
      const safeName=entity.replace(/[\\/*?[\]]/g,'').slice(0,28);
      XLSX.utils.book_append_sheet(wb,sheet,safeName);
    });
  }
  if(type==='hub'||type==='all'){
    const hub=buildHub();
    const hdr=['Direction','Entity','Net vs START','Balanced'];
    const rows=[...hub.incoming.map(e=>['Incoming',e.entity,e.netVsStart,e.pairs.every(p=>p.balanced)?'Yes':'No']),
      ...hub.outgoing.map(e=>['Outgoing',e.entity,Math.abs(e.netVsStart),e.pairs.every(p=>p.balanced)?'Yes':'No'])];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...rows]),'START Hub');
  }
  XLSX.writeFile(wb,`IntercoRecon_${ST.current?.file_name?.replace('.xlsx','')||'export'}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

      <td class="muted" style="font-size:11px">${[...new Set(e.pairs.flatMap(p=>{const pair=ST.pairs.find(x=>x.pair===p.pair);return pair?pair.cur:[]}))].join(', ')}</td>
      <td>${pairTagBadge(e.pairs[0]?.pair||e.entity)}</td>
    </tr>`).join('')}
    ${(!hub.incoming.length&&!hub.outgoing.length)?'<tr><td colspan="8" class="empty">All balanced</td></tr>':''}
  </tbody></table></div></div>`;
}

function drillSub(entity){
  const pair=ST.pairs.find(p=>p.pair.includes(entity)&&p.pair.includes('START')&&!p.pair.includes('ELIM'));
  if(pair){ST.selectedPair=pair.pair;ST.view='summary';ST.txPeriod='';ST.txDesc='';ST.txSide='';render();
    setTimeout(()=>{const el=document.getElementById('drill');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},80);}
}

function renderSummary(f){
  const detail=ST.selectedPair?ST.pairs.find(p=>p.pair===ST.selectedPair):null;
  const filtTx=detail?detail.txs.filter(t=>{
    if(ST.txPeriod&&t.per!==ST.txPeriod)return false;
    if(ST.txDesc&&t.desc!==ST.txDesc)return false;
    if(ST.txSide==='ar'&&!t.isAR)return false;
    if(ST.txSide==='ap'&&t.isAR)return false;
    if(ST.txTagFilter&&t.tag!==ST.txTagFilter)return false;
    return true;
  }):[];
  return`<div class="filters">
    <select onchange="ST.statusFilter=this.value;render()">
      <option value="all" ${ST.statusFilter==='all'?'selected':''}>All pairs</option>
      <option value="unbalanced" ${ST.statusFilter==='unbalanced'?'selected':''}>Variances only</option>
      <option value="balanced" ${ST.statusFilter==='balanced'?'selected':''}>Balanced only</option>
    </select>
    <input type="search" placeholder="Search pair…" value="${esc(ST.search)}" oninput="ST.search=this.value;render()" style="width:180px">
    <span class="muted" style="font-size:12px;margin-left:auto">${f.length} pairs</span>
  </div>
  <div class="card"><div class="scroll-x"><table>
    <thead><tr><th>Entity pair</th><th class="num">AR total</th><th class="num">AP total</th><th class="num">Variance</th><th>Status</th><th>Currencies</th><th>Tag</th><th class="num">Txns</th></tr></thead>
    <tbody>${f.map(p=>`<tr class="clickable ${ST.selectedPair===p.pair?'selected':''}" onclick="selectPair('${p.pair.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
      <td style="font-weight:500;min-width:145px">${esc(p.pair)}</td>
      <td class="num ok">${fmt(p.arT)}</td><td class="num info">${fmt(p.apT)}</td>
      <td class="num" style="font-weight:500">${fmtD(p.diff)}</td>
      <td>${p.balanced?'<span style="font-size:11px;color:#16a34a">✓</span>':'<span style="font-size:11px;color:#dc2626">⚠ Variance</span>'}</td>
      <td class="muted" style="font-size:11px">${p.cur.join(', ')}</td>
      <td>${pairTagBadge(p.pair)}</td>
      <td class="num">${p.txs.length}</td>
    </tr>`).join('')}
    ${f.length===0?'<tr><td colspan="8" class="empty">No pairs match</td></tr>':''}</tbody>
  </table></div></div>
  ${detail?`<div class="card" id="drill" style="border:0.5px solid #111">
    <div class="card-head">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="card-title">${esc(detail.pair)}</span>
        ${detail.per.map(p=>`<span class="pill">${p}</span>`).join('')}
        ${detail.cur.map(c=>`<span class="pill">${c}</span>`).join('')}
        ${pairTagBadge(detail.pair)}
      </div>
      <button class="btn" onclick="ST.selectedPair=null;render()">✕</button>
    </div>
    ${detail.who.length?`<div style="padding:7px 14px;border-bottom:0.5px solid #e5e5e5;background:#fafafa;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
      <span style="font-size:11px;color:#888">Who owes who:</span>
      ${[...new Set(detail.who)].map(w=>`<span class="pill" style="font-weight:500">${esc(w)}</span>`).join('')}
    </div>`:''}
    <div style="display:grid;grid-template-columns:repeat(4,1fr);border-bottom:0.5px solid #e5e5e5">
      ${[['AR total',fmt(detail.arT),'ok'],['AP total',fmt(detail.apT),'info'],['Variance',fmtD(detail.diff),''],['Transactions',detail.txs.length,'']].map(([l,v,c])=>`
      <div style="padding:9px 14px;border-right:0.5px solid #e5e5e5"><div style="font-size:11px;color:#888;margin-bottom:3px">${l}</div><div style="font-size:14px;font-weight:500" class="${c}">${v}</div></div>`).join('')}
    </div>
    <div class="scroll-x" style="border-bottom:0.5px solid #e5e5e5"><table>
      <thead><tr><th>Period</th><th class="num">AR</th><th class="num">AP</th><th class="num">Variance</th></tr></thead>
      <tbody>${detail.per.map(per=>{const ar=detail.arByP[per]||0,ap=detail.apByP[per]||0,d=ar-ap;
        return`<tr class="clickable" onclick="ST.txPeriod=ST.txPeriod==='${per}'?'':'${per}';render()">
          <td><span class="pill" style="${ST.txPeriod===per?'background:#111;color:#fff':''};cursor:pointer">${per}</span></td>
          <td class="num ok">${fmt(ar)}</td><td class="num info">${fmt(ap)}</td>
          <td class="num" style="font-weight:${Math.abs(d)<0.02?400:500}">${fmtD(d)}</td>
        </tr>`;}).join('')}</tbody>
    </table></div>
    <div style="display:flex;gap:8px;padding:7px 14px;border-bottom:0.5px solid #e5e5e5;flex-wrap:wrap;align-items:center">
      <span style="font-size:11px;color:#888">Filter:</span>
      <select onchange="ST.txPeriod=this.value;render()"><option value="">All periods</option>${detail.per.map(p=>`<option value="${p}" ${ST.txPeriod===p?'selected':''}>${p}</option>`).join('')}</select>
      <select onchange="ST.txDesc=this.value;render()"><option value="">All types</option>${detail.desc.map(d=>`<option value="${esc(d)}" ${ST.txDesc===d?'selected':''}>${esc(d)}</option>`).join('')}</select>
      <select onchange="ST.txSide=this.value;render()"><option value="">Both sides</option><option value="ar" ${ST.txSide==='ar'?'selected':''}>AR only</option><option value="ap" ${ST.txSide==='ap'?'selected':''}>AP only</option></select>
      <select onchange="ST.txTagFilter=this.value;render()"><option value="">All tags</option>${TAG_DEFS.map(t=>`<option value="${esc(t.tag)}" ${ST.txTagFilter===t.tag?'selected':''}>${esc(t.tag)}</option>`).join('')}</select>
      <span class="muted" style="font-size:11px;margin-left:auto">${filtTx.length} of ${detail.txs.length}</span>
    </div>
    <div class="scroll-x scroll-y"><table>
      <thead><tr><th>Side</th><th>Entity</th><th>Period</th><th>Type</th><th class="num">Amount</th><th>Curr</th><th>Tag</th><th>Memo</th><th>Doc #</th></tr></thead>
      <tbody>${filtTx.map(t=>`<tr style="background:${t.isAR?'#f0fdf4':'#eff6ff'}">
        <td>${t.isAR?'<span style="background:#dcfce7;color:#16a34a;font-size:10px;padding:2px 6px;border-radius:100px;font-weight:500">AR</span>':'<span style="background:#dbeafe;color:#2563eb;font-size:10px;padding:2px 6px;border-radius:100px;font-weight:500">AP</span>'}</td>
        <td style="font-weight:500">${esc(t.sub)}</td><td>${esc(t.per)}</td><td>${esc(t.desc)}</td>
        <td class="num">${fmt(t.amt)}</td><td>${esc(t.cur)}</td>
        <td>${txTagBadge(t)}</td>
        <td class="muted" style="font-size:11px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.memo)}</td>
        <td class="muted" style="font-size:11px">${esc(t.doc)}</td>
      </tr>`).join('')}
      ${filtTx.length===0?'<tr><td colspan="9" class="empty">No transactions match</td></tr>':''}</tbody>
    </table></div>
  </div>`:''}`;
}

function renderMonthly(f){
  return`<div class="filters">
    <select onchange="ST.statusFilter=this.value;render()">
      <option value="all" ${ST.statusFilter==='all'?'selected':''}>All pairs</option>
      <option value="unbalanced" ${ST.statusFilter==='unbalanced'?'selected':''}>Variances only</option>
      <option value="balanced" ${ST.statusFilter==='balanced'?'selected':''}>Balanced only</option>
    </select>
    <input type="search" placeholder="Search pair…" value="${esc(ST.search)}" oninput="ST.search=this.value;render()" style="width:180px">
  </div>
  <div class="card"><div class="scroll-x"><table>
    <thead>
      <tr>
        <th style="min-width:160px;position:sticky;left:0;z-index:2">Entity pair</th>
        <th style="position:sticky;left:160px;z-index:2;min-width:90px">Tag</th>
        ${ST.periods.map(p=>`<th colspan="3" style="text-align:center;border-left:0.5px solid #e5e5e5">${p}</th>`).join('')}
      </tr>
      <tr>
        <th style="position:sticky;left:0;z-index:2"></th>
        <th style="position:sticky;left:160px;z-index:2"></th>
        ${ST.periods.map(()=>['AR','AP','Var'].map((h,i)=>`<th class="num" style="font-size:10px;${i===0?'border-left:0.5px solid #e5e5e5':''}">${h}</th>`).join('')).join('')}
      </tr>
    </thead>
    <tbody>${f.map(p=>`<tr class="clickable" onclick="selectPair('${p.pair.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}');ST.view='summary';render()">
      <td style="font-weight:500;position:sticky;left:0;background:#fff;min-width:160px;z-index:1">${esc(p.pair)}</td>
      <td style="position:sticky;left:160px;background:#fff;z-index:1">${pairTagBadge(p.pair)}</td>
      ${ST.periods.map(per=>{const ar=p.arByP[per]||0,ap=p.apByP[per]||0,d=ar-ap;
        return`<td class="num ok" style="font-size:11px;border-left:0.5px solid #f0f0f0">${ar>0?fmt(ar):'—'}</td>
          <td class="num info" style="font-size:11px">${ap>0?fmt(ap):'—'}</td>
          <td class="num" style="font-size:11px;font-weight:${Math.abs(d)>0.02?500:400};color:${Math.abs(d)>0.02?'#dc2626':'#aaa'}">${Math.abs(d)>0.02?fmtD(d):'—'}</td>`;}).join('')}
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}

function renderPayments(pmts){
  if(!pmts.length)return`<div class="card" style="padding:3rem;text-align:center;color:#666"><div style="font-size:32px;margin-bottom:10px">✓</div><p style="font-weight:500;color:#111;margin-bottom:4px">All pairs balanced</p></div>`;
  return`<div style="background:#fef2f2;border:0.5px solid #fca5a5;border-radius:10px;padding:10px 14px;margin-bottom:1rem;display:flex;gap:10px;align-items:center">
    <span style="font-size:18px">⚠</span>
    <div><p style="font-size:13px;font-weight:500;color:#dc2626;margin-bottom:2px">${pmts.length} pair${pmts.length>1?'s':''} · Total: ${fmt(pmts.reduce((s,p)=>s+p.amt,0))}</p>
    <p style="font-size:12px;color:#dc2626">All payments route through START as intermediary</p></div>
  </div>
  <div class="card"><div class="card-head"><span class="card-title">Payment queue — routed through START</span></div>
  <div class="scroll-x"><table>
    <thead><tr><th>Pair</th><th>Payer</th><th></th><th>Via START</th><th></th><th>Payee</th><th class="num">Amount</th><th>Currencies</th><th>Tag</th><th></th></tr></thead>
    <tbody>${pmts.map(p=>`<tr class="clickable" onclick="selectPair('${p.pair.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}');ST.view='summary';render()">
      <td style="font-weight:500">${esc(p.pair)}</td>
      <td><span style="background:#fef2f2;color:#dc2626;font-size:11px;padding:2px 8px;border-radius:100px;font-weight:500">${esc(p.payer)}</span></td>
      <td class="muted">→</td>
      <td><span style="background:#f0fdf4;color:#166534;font-size:11px;padding:2px 8px;border-radius:100px;font-weight:500;border:0.5px solid #bbf7d0">START</span></td>
      <td class="muted">→</td>
      <td><span style="background:#dbeafe;color:#1d4ed8;font-size:11px;padding:2px 8px;border-radius:100px;font-weight:500">${esc(p.payee)}</span></td>
      <td class="num warn" style="font-size:13px;font-weight:500">${fmt(p.amt)}</td>
      <td class="muted" style="font-size:11px">${p.cur.join(', ')}</td>
      <td>${pairTagBadge(p.pair)}</td>
      <td><button class="btn" style="font-size:11px" onclick="event.stopPropagation();selectPair('${p.pair.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}');ST.view='summary';render()">Drill in →</button></td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}

// ── ENTITY STATEMENTS ───────────────────────────────────────────────────────
function renderStatements(){
  const entities=[...new Set(ST.rows.map(r=>r.sub_name).filter(Boolean))].sort();
  const stmtRows=ST.stmtEntity?ST.rows.filter(r=>r.sub_name===ST.stmtEntity):[];
  const arT=stmtRows.filter(r=>isAR(r)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const apT=stmtRows.filter(r=>!isAR(r)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  // group by pair key
  const byPair={};
  stmtRows.forEach(r=>{
    const k=r.pair_key||'Other';
    if(!byPair[k])byPair[k]={pair:k,txs:[],arT:0,apT:0};
    const a=parseFloat(r.amount)||0;
    if(isAR(r))byPair[k].arT+=a; else byPair[k].apT+=a;
    byPair[k].txs.push(r);
  });
  return`<div class="filters">
    <select onchange="ST.stmtEntity=this.value;render()" style="width:200px">
      <option value="">Select entity…</option>
      ${entities.map(e=>`<option value="${esc(e)}" ${ST.stmtEntity===e?'selected':''}>${esc(e)}</option>`).join('')}
    </select>
    ${ST.stmtEntity?`<button class="btn-blue" onclick="exportPDF('stmt')">⬇ PDF</button><button class="btn-green" onclick="exportExcel('stmt')">⬇ Excel</button>`:''}
  </div>
  ${!ST.stmtEntity?'<div class="card"><div class="empty">Select an entity to view its statement</div></div>':``}
  ${ST.stmtEntity?`
  <div class="card">
    <div class="stmt-entity-head">
      <span>${esc(ST.stmtEntity)} — Intercompany Statement</span>
      <div style="display:flex;gap:16px;font-size:12px">
        <span>AR: <strong class="ok">${fmt(arT)}</strong></span>
        <span>AP: <strong class="info">${fmt(apT)}</strong></span>
        <span>Net: <strong class="${arT-apT>=0?'ok':'warn'}">${fmtD(arT-apT)}</strong></span>
      </div>
    </div>
    ${Object.values(byPair).map(group=>`
      <div class="stmt-section-head">
        ${esc(group.pair)} &nbsp;·&nbsp; AR: ${fmt(group.arT)} &nbsp;·&nbsp; AP: ${fmt(group.apT)} &nbsp;·&nbsp; Net: ${fmtD(group.arT-group.apT)}
      </div>
      <div class="scroll-x"><table>
        <thead><tr><th>Side</th><th>Relationship</th><th class="num">Amount</th><th>Currency</th><th>Period</th><th>Description</th><th>Doc #</th><th>Memo</th><th>Tag</th></tr></thead>
        <tbody>${group.txs.map(r=>{const ar=isAR(r);return`<tr style="background:${ar?'#f0fdf4':'#eff6ff'}">
          <td>${ar?'<span style="background:#dcfce7;color:#16a34a;font-size:10px;padding:2px 6px;border-radius:100px;font-weight:500">AR</span>':'<span style="background:#dbeafe;color:#2563eb;font-size:10px;padding:2px 6px;border-radius:100px;font-weight:500">AP</span>'}</td>
          <td style="font-size:11px">${esc(r.relationship)}</td>
          <td class="num">${fmt(r.amount)}</td>
          <td>${esc(r.currency)}</td>
          <td>${esc(r.period)}</td>
          <td>${esc(r.description)}</td>
          <td class="muted" style="font-size:11px">${esc(r.doc_number)}</td>
          <td class="muted" style="font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.memo)}</td>
          <td>${txTagBadge({id:r.id,tag:r.tag,tag_note:r.tag_note,tagged_by:r.tagged_by})}</td>
        </tr>`}).join('')}</tbody>
      </table></div>
    `).join('')}
  </div>`:''}`;
}

// ── RAW DATA VIEW ────────────────────────────────────────────────────────────
function renderRaw(){
  let rows=ST.rows;
  if(ST.rawPair) rows=rows.filter(r=>r.pair_key===ST.rawPair);
  if(ST.rawPeriod) rows=rows.filter(r=>r.period===ST.rawPeriod);
  if(ST.rawSearch) rows=rows.filter(r=>JSON.stringify(r).toLowerCase().includes(ST.rawSearch.toLowerCase()));
  const total=rows.length, pages=Math.ceil(total/PAGE_SIZE);
  const page=Math.min(ST.rawPage,pages-1);
  const pageRows=rows.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  const pairs=[...new Set(ST.rows.map(r=>r.pair_key).filter(Boolean))].sort();
  return`<div class="filters" style="margin-bottom:8px">
    <input type="search" placeholder="Search all fields…" value="${esc(ST.rawSearch)}" oninput="ST.rawSearch=this.value;ST.rawPage=0;render()" style="width:200px">
    <select onchange="ST.rawPair=this.value;ST.rawPage=0;render()">
      <option value="">All pairs</option>
      ${pairs.map(p=>`<option value="${esc(p)}" ${ST.rawPair===p?'selected':''}>${esc(p)}</option>`).join('')}
    </select>
    <select onchange="ST.rawPeriod=this.value;ST.rawPage=0;render()">
      <option value="">All periods</option>
      ${ST.periods.map(p=>`<option value="${p}" ${ST.rawPeriod===p?'selected':''}>${p}</option>`).join('')}
    </select>
    <span class="muted" style="font-size:12px">${total.toLocaleString()} rows</span>
    <span style="font-size:11px;color:#888;margin-left:auto"><span style="background:#fef9c3;border:1px dashed #ca8a04;padding:1px 5px;border-radius:3px;font-size:10px">yellow</span> = edited field</span>
  </div>
  <div class="card">
    <div class="card-head">
      <span class="card-title">Raw data — click any yellow-bordered cell to edit</span>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="muted" style="font-size:11px">Page ${page+1} of ${Math.max(1,pages)}</span>
        <button class="btn" onclick="ST.rawPage=Math.max(0,ST.rawPage-1);render()" ${page===0?'disabled':''}>← Prev</button>
        <button class="btn" onclick="ST.rawPage=Math.min(${pages-1},ST.rawPage+1);render()" ${page>=pages-1?'disabled':''}>Next →</button>
      </div>
    </div>
    <div class="scroll-x scroll-y"><table>
      <thead><tr>
        <th>Tag</th>
        ${EDITABLE_FIELDS.map(f=>`<th style="background:#f0fdf4;color:#166534">${f.label}</th>`).join('')}
        ${READONLY_FIELDS.map(f=>`<th style="background:#fafafa;color:#888">${f.label}</th>`).join('')}
      </tr></thead>
      <tbody>${pageRows.map(r=>`<tr>
        <td>${txTagBadge({id:r.id,tag:r.tag,tag_note:r.tag_note,tagged_by:r.tagged_by})}</td>
        ${EDITABLE_FIELDS.map(f=>`<td style="min-width:90px">${editableCell(r,f.key,r[f.key])}</td>`).join('')}
        ${READONLY_FIELDS.map(f=>`<td class="muted" style="font-size:11px;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis">${esc(r[f.key])}</td>`).join('')}
      </tr>`).join('')}
      ${pageRows.length===0?'<tr><td colspan="30" class="empty">No rows match</td></tr>':''}</tbody>
    </table></div>
  </div>
  <p style="font-size:11px;color:#888">Editable columns (green headers) save directly to Supabase on Enter or click away. Read-only columns (grey) are for reference only.</p>`;
}

function selectPair(pair){
  ST.selectedPair=ST.selectedPair===pair?null:pair;
  ST.txPeriod='';ST.txDesc='';ST.txSide='';ST.txTagFilter='';
  render();
  setTimeout(()=>{const el=document.getElementById('drill');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},60);
}

function renderModal(){
  const m=ST.modal;
  const existing=m.type==='pair'?ST.pairTags[m.target]:ST.txTags[m.target];
  return`<div class="modal-overlay" onclick="ST.modal=null;render()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">${m.type==='pair'?`Tag pair: ${esc(m.target)}`:'Tag transaction'}</div>
    <div class="form-row"><label class="form-label">Your name (shown to team)</label>
      <input type="text" id="tagger-name" placeholder="e.g. Yary" style="width:100%" value="${esc(existing?.by||existing?.tagged_by||'')}"></div>
    <div class="form-row"><label class="form-label">Tag <span style="color:#dc2626">*</span></label>
      <select id="tag-select" style="width:100%">${tagOptions(existing?.tag||'')}</select></div>
    <div class="form-row"><label class="form-label">Add custom tag</label>
      <div style="display:flex;gap:8px"><input type="text" id="custom-tag-input" placeholder="Type new tag…" style="flex:1"><button class="btn" onclick="addCustomTag()">Add</button></div></div>
    <div class="form-row"><label class="form-label">Note</label>
      <textarea id="tag-note" placeholder="Add context for your team…">${esc(existing?.tag_note||existing?.note||'')}</textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
      ${existing?.tag?`<button class="btn" style="color:#dc2626;border-color:#fca5a5" onclick="clearTag()">Remove</button>`:''}
      <button class="btn" onclick="ST.modal=null;render()">Cancel</button>
      <button class="btn-dark" onclick="saveTag()">Save tag</button>
    </div>
  </div></div>`;
}

init();
</script>
</body>
</html>
