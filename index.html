<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Intercompany Recon — Evolve2Impact</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;color:#111;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
button,select,input{font-family:inherit}
.btn{font-size:12px;padding:6px 12px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#111;cursor:pointer}
.btn:hover{background:#f5f5f3}
.btn-dark{font-size:13px;padding:7px 16px;border-radius:8px;border:none;background:#111;color:#fff;cursor:pointer;font-weight:500}
.btn-dark:hover{background:#333}
.btn-danger{font-size:12px;padding:5px 10px;border-radius:8px;border:0.5px solid #fca5a5;background:#fef2f2;color:#dc2626;cursor:pointer}
.card{background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;overflow:hidden;margin-bottom:1rem}
.card-head{padding:11px 16px;border-bottom:0.5px solid #e5e5e5;background:#fafafa;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:500}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1rem}
.metric{background:#fafafa;border-radius:8px;padding:10px 12px}
.metric-label{font-size:11px;color:#666;margin-bottom:3px}
.metric-val{font-size:19px;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;font-size:11px;font-weight:500;color:#666;border-bottom:0.5px solid #e5e5e5;white-space:nowrap;background:#fafafa;position:sticky;top:0}
td{padding:7px 10px;border-bottom:0.5px solid #f0f0f0;vertical-align:middle}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:#fafafa}
tr.active td{background:#f5f5f3}
.badge-ok{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 7px;border-radius:100px;font-weight:500;background:#dcfce7;color:#16a34a}
.badge-warn{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 7px;border-radius:100px;font-weight:500;background:#fef2f2;color:#dc2626}
.badge-ap{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:100px;font-weight:500;background:#eff6ff;color:#2563eb}
.pill{font-size:11px;padding:2px 7px;border-radius:100px;border:0.5px solid #e5e5e5;color:#666;background:#fafafa;white-space:nowrap}
.tabs{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.tab{font-size:12px;padding:5px 13px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#111;cursor:pointer}
.tab.active{background:#111;color:#fff;border-color:#111;font-weight:500}
select{font-size:12px;padding:5px 9px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#111}
input[type=text],input[type=search]{font-size:12px;padding:5px 9px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#111}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.num{text-align:right;font-variant-numeric:tabular-nums}
.ok{color:#16a34a}.warn{color:#dc2626}.info{color:#2563eb}.muted{color:#666}
.scroll-x{overflow-x:auto}
.scroll-y{overflow-y:auto;max-height:340px}
.loading{padding:3rem;text-align:center;color:#666;font-size:13px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid #e5e5e5;border-top-color:#111;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:2rem;text-align:center;color:#999;font-size:12px}
.progress-bar{height:4px;background:#e5e5e5;border-radius:4px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;background:#111;border-radius:4px;transition:width .3s}

/* Upload screen */
.upload-wrap{max-width:520px;margin:4rem auto;padding:0 1rem}
.drop-zone{border:2px dashed #ccc;border-radius:12px;padding:2.5rem 2rem;text-align:center;cursor:pointer;transition:all .15s}
.drop-zone:hover,.drop-zone.drag{border-color:#111;background:#f5f5f3}
.drop-zone.uploading{cursor:default;pointer-events:none}

/* header */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.header-title{font-size:18px;font-weight:500;margin-bottom:2px}
.header-sub{font-size:12px;color:#666}
</style>
</head>
<body>
<div class="app" id="app"><div class="loading"><span class="spin"></span>Loading…</div></div>

<script>
const SUPA_URL = 'https://zwinmrqclkefpsfedwgg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3aW5tcnFjbGtlZnBzZmVkd2dnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjY5MzUsImV4cCI6MjA5NjEwMjkzNX0.1uQY3ypn9223gDAWodnqmW82gfNBFo-whBhl4GMU5Dw';
const H = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

async function sbGet(table, params=''){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`,{headers:H});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(table, body){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, params){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`,{method:'DELETE',headers:H});
  if(!r.ok) throw new Error(await r.text());
}

const fmt = v => '$'+Math.abs(Number(v)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD = v => {
  if(Math.abs(v)<0.02) return '<span class="ok">—</span>';
  return `<span class="warn">${v>0?'+':'-'}${fmt(v)}</span>`;
};
const isAR = r => r.relationship && (r.relationship.includes('A/R') || r.relationship.toLowerCase().includes('due from'));
const PORD = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const sortP = (a,b)=>{ const [am,ay]=a.split(' '),[bm,by]=b.split(' '); return ay!==by?Number(ay)-Number(by):PORD.indexOf(am)-PORD.indexOf(bm); };
const esc = s => String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── STATE ──────────────────────────────────────────────────────────────────
let S = {
  screen: 'loading', // loading | upload | dashboard
  uploads: [],
  currentUpload: null,
  rows: [],
  pairs: [],
  periods: [],
  view: 'summary',
  statusFilter: 'all',
  search: '',
  selectedPair: null,
  txPeriod: '', txDesc: '', txSide: '',
  uploadStatus: null, // null | parsing | saving | done | error
  uploadMsg: '',
  uploadProgress: 0,
};

function aggregate(rows){
  const map = {};
  rows.forEach(r => {
    const pair = r.pair_key||''; if(!pair) return;
    if(!map[pair]) map[pair]={pair,arByP:{},apByP:{},cur:new Set(),desc:new Set(),per:new Set(),txs:[],who:new Set()};
    const p=map[pair];
    const amt=parseFloat(r.amount)||0;
    p.cur.add(r.currency||''); p.desc.add(r.description||''); p.per.add(r.period||'');
    if(r.who_owes_who) p.who.add(r.who_owes_who);
    if(isAR(r)) p.arByP[r.period]=(p.arByP[r.period]||0)+amt;
    else        p.apByP[r.period]=(p.apByP[r.period]||0)+amt;
    p.txs.push({sub:r.sub_name,rel:r.relationship,amt,desc:r.description,per:r.period,cur:r.currency,who:r.who_owes_who,doc:r.doc_number,memo:(r.memo||'').slice(0,80),isAR:isAR(r)});
  });
  S.pairs = Object.values(map).map(p=>{
    const arT=Object.values(p.arByP).reduce((s,v)=>s+v,0);
    const apT=Object.values(p.apByP).reduce((s,v)=>s+v,0);
    const diff=arT-apT;
    return {pair:p.pair,arT,apT,diff,balanced:Math.abs(diff)<0.02,
      cur:[...p.cur].filter(Boolean).sort(),desc:[...p.desc].filter(Boolean).sort(),
      per:[...p.per].filter(Boolean).sort(sortP),txs:p.txs,
      who:[...new Set([...p.who])],arByP:p.arByP,apByP:p.apByP};
  }).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  S.periods=[...new Set(rows.map(r=>r.period||'').filter(Boolean))].sort(sortP);
}

function filtered(){ return S.pairs.filter(p=>{
  if(S.statusFilter==='unbalanced'&&p.balanced) return false;
  if(S.statusFilter==='balanced'&&!p.balanced) return false;
  if(S.search&&!p.pair.toLowerCase().includes(S.search.toLowerCase())) return false;
  return true;
}); }

function payments(){ return S.pairs.filter(p=>!p.balanced).map(p=>{
  const [e1,e2]=(p.pair+'|').split('|').map(s=>s.trim());
  const [payer,payee]=p.diff>0?[e2,e1]:[e1,e2];
  return {pair:p.pair,payer,payee,amt:Math.abs(p.diff),cur:p.cur,per:p.per};
}); }

// ── UPLOAD LOGIC ───────────────────────────────────────────────────────────
async function processFile(file){
  S.uploadStatus='parsing'; S.uploadMsg='Reading file…'; S.uploadProgress=20; render();
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf,{type:'array',cellDates:true});
    const sheetName = wb.SheetNames.find(n=>n.toLowerCase().includes('interco')&&n.toLowerCase().includes('result'))||wb.SheetNames[0];
    const raw = XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{defval:''});

    S.uploadStatus='saving'; S.uploadMsg=`Saving ${raw.length.toLocaleString()} rows to Supabase…`; S.uploadProgress=40; render();

    const periods=[...new Set(raw.map(r=>String(r['Period']||'')).filter(Boolean))];
    const [upload] = await sbPost('uploads',{file_name:file.name,row_count:raw.length,periods});

    const BATCH=400;
    for(let i=0;i<raw.length;i+=BATCH){
      const slice=raw.slice(i,i+BATCH).map(r=>({
        upload_id: upload.id,
        pair_key:     String(r['Pair Key']||'').trim(),
        sub_name:     String(r['Sub Name']||'').trim(),
        relationship: String(r['Relationship']||'').trim(),
        amount:       parseFloat(r['Amount (Foreign Currency)'])||0,
        currency:     String(r['Currency']||'').trim(),
        period:       String(r['Period']||'').trim(),
        description:  String(r['Description']||'').trim(),
        who_owes_who: String(r['Who Owes Who']||'').trim(),
        doc_number:   String(r['Document Number']||'').trim(),
        memo:         String(r['Memo (Main)']||r['Memo']||'').slice(0,120),
      }));
      await sbPost('transactions',slice);
      S.uploadProgress = 40 + Math.round((i/raw.length)*55);
      S.uploadMsg = `Saving rows ${i+1}–${Math.min(i+BATCH,raw.length)} of ${raw.length.toLocaleString()}…`;
      render();
    }

    S.uploadStatus='done'; S.uploadMsg='Saved! Loading dashboard…'; S.uploadProgress=100; render();
    await loadUpload(upload);
  } catch(e){
    S.uploadStatus='error'; S.uploadMsg='Error: '+e.message; render();
  }
}

// ── DATA LOADING ───────────────────────────────────────────────────────────
async function loadUpload(upload){
  S.currentUpload=upload; S.screen='loading';
  document.getElementById('app').innerHTML=`<div class="loading"><span class="spin"></span>Loading ${esc(upload.file_name)}…</div>`;
  S.rows = await sbGet('transactions',`upload_id=eq.${upload.id}&order=period.asc&limit=9999`);
  aggregate(S.rows);
  S.screen='dashboard'; S.view='summary'; S.selectedPair=null; S.search=''; S.statusFilter='all';
  render();
}

async function init(){
  try {
    S.uploads = await sbGet('uploads','order=created_at.desc');
    if(S.uploads.length===0){ S.screen='upload'; S.uploadStatus=null; render(); return; }
    await loadUpload(S.uploads[0]);
  } catch(e){
    document.getElementById('app').innerHTML=`<div class="loading" style="color:#dc2626">Connection error: ${e.message}</div>`;
  }
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  if(S.screen==='upload'){ renderUpload(); return; }
  if(S.screen==='dashboard'){ renderDashboard(); return; }
}

function renderUpload(){
  const icons = {null:'📂',parsing:'⏳',saving:'💾',done:'✓',error:'✗'};
  const colors = {error:'#dc2626',done:'#16a34a'};
  document.getElementById('app').innerHTML=`
  <div class="upload-wrap">
    <div style="margin-bottom:1.5rem">
      <div style="font-size:22px;font-weight:500;margin-bottom:6px">Intercompany Recon</div>
      <div style="font-size:13px;color:#666">Evolve2Impact Group · Upload your NetSuite IC export</div>
    </div>

    <div class="drop-zone ${S.uploadStatus?'uploading':''}" id="dropzone"
      onclick="${!S.uploadStatus?"document.getElementById('fi').click()":''}"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="event.preventDefault();this.classList.remove('drag');if(!window._S_uploading)handleDrop(event)">
      <div style="font-size:32px;margin-bottom:12px">${icons[S.uploadStatus]||icons[null]}</div>
      <div style="font-size:14px;font-weight:500;color:${colors[S.uploadStatus]||'#111'};margin-bottom:6px">
        ${S.uploadStatus ? S.uploadMsg : 'Drop your .xlsx file here'}
      </div>
      <div style="font-size:12px;color:#666">${!S.uploadStatus?'or click to browse · .xlsx, .xls':'&nbsp;'}</div>
      ${S.uploadStatus&&S.uploadStatus!=='error'&&S.uploadStatus!=='done'?`<div class="progress-bar"><div class="progress-fill" style="width:${S.uploadProgress}%"></div></div>`:''}
    </div>
    <input id="fi" type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="handlePick(this)">

    ${S.uploads.length>0?`
    <div style="margin:1.25rem 0;display:flex;gap:10px;align-items:center">
      <div style="flex:1;height:0.5px;background:#e5e5e5"></div>
      <span style="font-size:12px;color:#999">or load a previous month</span>
      <div style="flex:1;height:0.5px;background:#e5e5e5"></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Upload history</span></div>
      <table><thead><tr><th>File</th><th>Periods</th><th class="num">Rows</th><th>Date</th><th></th></tr></thead>
      <tbody>${S.uploads.map(u=>`<tr class="clickable" onclick="loadUpload(${JSON.stringify(u).replace(/"/g,'&quot;')})">
        <td style="font-weight:500">${esc(u.file_name)}</td>
        <td class="muted" style="font-size:11px">${(u.periods||[]).join(', ')}</td>
        <td class="num">${(u.row_count||0).toLocaleString()}</td>
        <td class="muted" style="font-size:11px">${new Date(u.created_at).toLocaleDateString()}</td>
        <td><button class="btn" style="font-size:11px">Load →</button></td>
      </tr>`).join('')}</tbody></table>
    </div>`:''}

    <div style="margin-top:1.25rem;background:#fafafa;border-radius:10px;padding:12px 14px;font-size:12px;color:#666;line-height:1.7">
      <strong style="color:#111">Expected sheet:</strong> IntercoReconTransactionsResult<br>
      <strong style="color:#111">Key columns:</strong> Pair Key · Sub Name · Relationship · Amount (Foreign Currency) · Period · Who Owes Who
    </div>
  </div>`;
}

function handleDrop(e){ const f=e.dataTransfer.files[0]; if(f) processFile(f); }
function handlePick(inp){ const f=inp.files[0]; if(f) processFile(f); inp.value=''; }

function renderDashboard(){
  const f=filtered(), pmts=payments();
  const u=S.currentUpload;
  const detail=S.selectedPair?S.pairs.find(p=>p.pair===S.selectedPair):null;
  const filtTx=detail?detail.txs.filter(t=>{
    if(S.txPeriod&&t.per!==S.txPeriod) return false;
    if(S.txDesc&&t.desc!==S.txDesc) return false;
    if(S.txSide==='ar'&&!t.isAR) return false;
    if(S.txSide==='ap'&&t.isAR) return false;
    return true;
  }):[];
  const tv=S.pairs.reduce((s,p)=>s+Math.abs(p.diff),0);
  const ub=S.pairs.filter(p=>!p.balanced).length;

  document.getElementById('app').innerHTML=`
  <div class="header">
    <div>
      <div class="header-title">Intercompany Recon</div>
      <div class="header-sub">${esc(u?u.file_name:'')} · ${S.rows.length.toLocaleString()} transactions · ${S.pairs.length} pairs · ${S.periods.join(', ')}</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="S.screen='upload';render()">+ New upload</button>
      <button class="btn" onclick="S.screen='upload';render()">Switch month</button>
      ${u?`<button class="btn btn-danger" onclick="deleteUpload('${u.id}')">Delete</button>`:''}
    </div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Entity pairs</div><div class="metric-val">${S.pairs.length}</div></div>
    <div class="metric"><div class="metric-label">Balanced</div><div class="metric-val ok">${S.pairs.length-ub}</div></div>
    <div class="metric"><div class="metric-label">Variances</div><div class="metric-val ${ub>0?'warn':'ok'}">${ub}</div></div>
    <div class="metric"><div class="metric-label">Total variance</div><div class="metric-val ${tv>0?'warn':'ok'}">${fmt(tv)}</div></div>
    <div class="metric"><div class="metric-label">Transactions</div><div class="metric-val">${S.rows.length.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">Periods</div><div class="metric-val">${S.periods.length}</div></div>
  </div>

  <div class="tabs">
    <button class="tab ${S.view==='summary'?'active':''}" onclick="S.view='summary';render()">Summary</button>
    <button class="tab ${S.view==='monthly'?'active':''}" onclick="S.view='monthly';render()">By month</button>
    <button class="tab ${S.view==='payments'?'active':''}" onclick="S.view='payments';render()">Payment queue${pmts.length>0?' ('+pmts.length+')':''}</button>
  </div>

  ${S.view==='summary'?renderSummaryHTML(f,detail,filtTx):''}
  ${S.view==='monthly'?renderMonthlyHTML(f):''}
  ${S.view==='payments'?renderPaymentsHTML(pmts):''}
  `;
}

function renderSummaryHTML(f,detail,filtTx){
  return `
  <div class="filters">
    <select onchange="S.statusFilter=this.value;render()">
      <option value="all" ${S.statusFilter==='all'?'selected':''}>All pairs</option>
      <option value="unbalanced" ${S.statusFilter==='unbalanced'?'selected':''}>Variances only</option>
      <option value="balanced" ${S.statusFilter==='balanced'?'selected':''}>Balanced only</option>
    </select>
    <input type="search" placeholder="Search pair…" value="${esc(S.search)}" oninput="S.search=this.value;render()" style="width:180px">
    <span class="muted" style="font-size:12px;margin-left:auto">${f.length} pairs shown</span>
  </div>
  <div class="card"><div class="scroll-x"><table>
    <thead><tr>
      <th>Entity pair</th><th class="num">AR total</th><th class="num">AP total</th>
      <th class="num">Variance</th><th>Status</th><th>Currencies</th><th class="num">Txns</th>
    </tr></thead>
    <tbody>${f.map(p=>`<tr class="clickable ${S.selectedPair===p.pair?'active':''}" onclick="selectPair('${p.pair.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
      <td style="font-weight:500;min-width:150px">${esc(p.pair)}</td>
      <td class="num ok">${fmt(p.arT)}</td>
      <td class="num info">${fmt(p.apT)}</td>
      <td class="num" style="font-weight:500">${fmtD(p.diff)}</td>
      <td>${p.balanced?'<span class="badge-ok">✓ Balanced</span>':'<span class="badge-warn">⚠ Variance</span>'}</td>
      <td class="muted" style="font-size:11px">${p.cur.join(', ')}</td>
      <td class="num">${p.txs.length}</td>
    </tr>`).join('')}
    ${f.length===0?'<tr><td colspan="7" class="empty">No pairs match</td></tr>':''}</tbody>
  </table></div></div>

  ${detail?`<div class="card" id="drill" style="border:0.5px solid #111">
    <div class="card-head">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="card-title">${esc(detail.pair)}</span>
        ${detail.per.map(p=>`<span class="pill">${p}</span>`).join('')}
        ${detail.cur.map(c=>`<span class="pill">${c}</span>`).join('')}
      </div>
      <button class="btn" onclick="S.selectedPair=null;render()">✕ Close</button>
    </div>
    ${detail.who.length?`<div style="padding:8px 14px;border-bottom:0.5px solid #e5e5e5;background:#fafafa;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
      <span style="font-size:11px;color:#666">Who owes who:</span>
      ${[...new Set(detail.who)].map(w=>`<span class="pill" style="font-weight:500">${esc(w)}</span>`).join('')}
    </div>`:''}
    <div style="display:grid;grid-template-columns:repeat(4,1fr);border-bottom:0.5px solid #e5e5e5">
      ${[['AR total',fmt(detail.arT),'ok'],['AP total',fmt(detail.apT),'info'],['Variance',fmtD(detail.diff),''],['Transactions',detail.txs.length,'']].map(([l,v,c])=>`
      <div style="padding:10px 14px;border-right:0.5px solid #e5e5e5">
        <div style="font-size:11px;color:#666;margin-bottom:3px">${l}</div>
        <div style="font-size:14px;font-weight:500" class="${c}">${v}</div>
      </div>`).join('')}
    </div>
    <div class="scroll-x" style="border-bottom:0.5px solid #e5e5e5">
      <table><thead><tr><th>Period</th><th class="num">AR</th><th class="num">AP</th><th class="num">Variance</th></tr></thead>
      <tbody>${detail.per.map(per=>{
        const ar=detail.arByP[per]||0,ap=detail.apByP[per]||0,d=ar-ap;
        return `<tr class="clickable" onclick="S.txPeriod=S.txPeriod==='${per}'?'':'${per}';render()">
          <td><span class="pill" style="${S.txPeriod===per?'background:#111;color:#fff':''};cursor:pointer">${per}</span></td>
          <td class="num ok">${fmt(ar)}</td><td class="num info">${fmt(ap)}</td>
          <td class="num" style="font-weight:${Math.abs(d)<0.02?400:500}">${fmtD(d)}</td>
        </tr>`;
      }).join('')}</tbody></table>
    </div>
    <div style="display:flex;gap:8px;padding:8px 14px;border-bottom:0.5px solid #e5e5e5;flex-wrap:wrap;align-items:center">
      <span style="font-size:11px;color:#666">Filter transactions:</span>
      <select onchange="S.txPeriod=this.value;render()">
        <option value="">All periods</option>
        ${detail.per.map(p=>`<option value="${p}" ${S.txPeriod===p?'selected':''}>${p}</option>`).join('')}
      </select>
      <select onchange="S.txDesc=this.value;render()">
        <option value="">All types</option>
        ${detail.desc.map(d=>`<option value="${esc(d)}" ${S.txDesc===d?'selected':''}>${esc(d)}</option>`).join('')}
      </select>
      <select onchange="S.txSide=this.value;render()">
        <option value="" ${S.txSide===''?'selected':''}>Both sides</option>
        <option value="ar" ${S.txSide==='ar'?'selected':''}>AR only</option>
        <option value="ap" ${S.txSide==='ap'?'selected':''}>AP only</option>
      </select>
      <span class="muted" style="font-size:11px;margin-left:auto">${filtTx.length} of ${detail.txs.length}</span>
    </div>
    <div class="scroll-x scroll-y"><table>
      <thead><tr><th>Side</th><th>Entity</th><th>Period</th><th>Type</th><th class="num">Amount</th><th>Curr</th><th>Memo</th><th>Doc #</th></tr></thead>
      <tbody>${filtTx.map(t=>`<tr style="background:${t.isAR?'#f0fdf4':'#eff6ff'}">
        <td>${t.isAR?'<span class="badge-ok" style="font-size:10px">AR</span>':'<span class="badge-ap">AP</span>'}</td>
        <td style="font-weight:500">${esc(t.sub)}</td><td>${esc(t.per)}</td><td>${esc(t.desc)}</td>
        <td class="num">${fmt(t.amt)}</td><td>${esc(t.cur)}</td>
        <td class="muted" style="font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.memo)}</td>
        <td class="muted" style="font-size:11px">${esc(t.doc)}</td>
      </tr>`).join('')}
      ${filtTx.length===0?'<tr><td colspan="8" class="empty">No transactions match</td></tr>':''}</tbody>
    </table></div>
  </div>`:''}`;
}

function renderMonthlyHTML(f){
  return `
  <div class="filters">
    <select onchange="S.statusFilter=this.value;render()">
      <option value="all" ${S.statusFilter==='all'?'selected':''}>All pairs</option>
      <option value="unbalanced" ${S.statusFilter==='unbalanced'?'selected':''}>Variances only</option>
      <option value="balanced" ${S.statusFilter==='balanced'?'selected':''}>Balanced only</option>
    </select>
    <input type="search" placeholder="Search pair…" value="${esc(S.search)}" oninput="S.search=this.value;render()" style="width:180px">
  </div>
  <div class="card"><div class="scroll-x"><table>
    <thead>
      <tr>
        <th style="min-width:160px;position:sticky;left:0">Entity pair</th>
        ${S.periods.map(p=>`<th colspan="3" style="text-align:center;border-left:0.5px solid #e5e5e5">${p}</th>`).join('')}
      </tr>
      <tr>
        <th style="position:sticky;left:0"></th>
        ${S.periods.map(p=>['AR','AP','Var'].map(h=>`<th class="num" style="font-size:10px;${h==='AR'?'border-left:0.5px solid #e5e5e5':''}">${h}</th>`).join('')).join('')}
      </tr>
    </thead>
    <tbody>${f.map(p=>`<tr class="clickable" onclick="selectPair('${p.pair.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}');S.view='summary';render()">
      <td style="font-weight:500;position:sticky;left:0;background:#fff;min-width:160px">${esc(p.pair)}</td>
      ${S.periods.map(per=>{
        const ar=p.arByP[per]||0,ap=p.apByP[per]||0,d=ar-ap;
        return `<td class="num ok" style="font-size:11px;border-left:0.5px solid #f0f0f0">${ar>0?fmt(ar):'—'}</td>
          <td class="num info" style="font-size:11px">${ap>0?fmt(ap):'—'}</td>
          <td class="num" style="font-size:11px;font-weight:${Math.abs(d)>0.02?500:400};color:${Math.abs(d)>0.02?'#dc2626':'#999'}">${Math.abs(d)>0.02?fmtD(d):'—'}</td>`;
      }).join('')}
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}

function renderPaymentsHTML(pmts){
  if(!pmts.length) return `<div class="card" style="padding:3rem;text-align:center;color:#666">
    <div style="font-size:32px;margin-bottom:12px">✓</div>
    <p style="font-weight:500;color:#111;margin-bottom:4px">All pairs balanced</p>
    <p style="font-size:12px">No payments required</p>
  </div>`;
  return `
  <div style="background:#fef2f2;border:0.5px solid #fca5a5;border-radius:10px;padding:12px 14px;margin-bottom:1rem;display:flex;gap:10px;align-items:center">
    <span style="font-size:20px;flex-shrink:0">⚠</span>
    <div>
      <p style="font-size:13px;font-weight:500;color:#dc2626;margin-bottom:2px">${pmts.length} pair${pmts.length>1?'s':''} require action</p>
      <p style="font-size:12px;color:#dc2626">Total outstanding: ${fmt(pmts.reduce((s,p)=>s+p.amt,0))}</p>
    </div>
  </div>
  <div class="card"><div class="card-head"><span class="card-title">Payment queue — who pays whom</span></div>
  <div class="scroll-x"><table>
    <thead><tr><th>Pair</th><th>Payer (owes)</th><th></th><th>Payee (receives)</th><th class="num">Amount due</th><th>Currencies</th><th>Periods</th><th></th></tr></thead>
    <tbody>${pmts.map(p=>`<tr class="clickable" onclick="selectPair('${p.pair.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}');S.view='summary';render()">
      <td style="font-weight:500">${esc(p.pair)}</td>
      <td><span style="background:#fef2f2;color:#dc2626;font-size:11px;padding:2px 8px;border-radius:100px;font-weight:500">${esc(p.payer)}</span></td>
      <td class="muted">→</td>
      <td><span style="background:#dcfce7;color:#16a34a;font-size:11px;padding:2px 8px;border-radius:100px;font-weight:500">${esc(p.payee)}</span></td>
      <td class="num warn" style="font-size:13px;font-weight:500">${fmt(p.amt)}</td>
      <td class="muted" style="font-size:11px">${p.cur.join(', ')}</td>
      <td class="muted" style="font-size:11px">${p.per.join(', ')}</td>
      <td><button class="btn" style="font-size:11px" onclick="event.stopPropagation();selectPair('${p.pair.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}');S.view='summary';render()">Investigate →</button></td>
    </tr>`).join('')}</tbody>
  </table></div></div>
  <p style="font-size:11px;color:#999;padding:4px 0">Payer/payee inferred from AR vs AP totals and Who Owes Who field. Click any row to drill into transactions.</p>`;
}

function selectPair(pair){
  S.selectedPair = S.selectedPair===pair?null:pair;
  S.txPeriod=''; S.txDesc=''; S.txSide='';
  render();
  setTimeout(()=>{const el=document.getElementById('drill');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},50);
}

async function deleteUpload(id){
  if(!confirm('Delete this upload and all its transactions from Supabase?')) return;
  await sbDelete('transactions',`upload_id=eq.${id}`);
  await sbDelete('uploads',`id=eq.${id}`);
  S.uploads = await sbGet('uploads','order=created_at.desc');
  S.screen='upload'; render();
}

init();
</script>
</body>
</html>
